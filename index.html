<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창원경화카풀 실시간 동기화 시스템 v23</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- 🌐 Firebase 핵심 SDK 및 Realtime Database 라이브러리 탑재 (v10 호환 모드) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script>
    // 🛠️ 본인의 Firebase 프로젝트 정보로 이 부분을 반드시 수정해 주세요!
    const firebaseConfig = {
  apiKey: "AIzaSyAr6TlLN5_SPZwfnGgyxQkR3zQrtPIbOKg",
  authDomain: "changwongyeonghwa-carpool.firebaseapp.com",
  databaseURL: "https://changwongyeonghwa-carpool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "changwongyeonghwa-carpool";
    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-4">

  <!-- x-init을 통해 시스템 구동 시 Firebase 실시간 리스너 작동 -->
  <div x-data="{
    step: 'passenger', 
    notice: '📢 운전자와 동승자가 여러 차례 충분한 의사 소통을 하세요.',
    inputNotice: '',

    isUserLoggedIn: false, 
    loginName: '',
    loginPhoneTail: '',
    currentUser: null, 

    isAdminAuthenticated: false,
    adminIdInput: '',
    adminPasswordInput: '',
    
    currentAdminId: 'admin',
    currentAdminPassword: '1914', 
    
    newAdminId: '',
    newAdminPassword: '',
    showPasswordModal: false,

    // [👥 화이트리스트 회원 관리 DB] - Firebase 연동
    allowedMembers: [],
    newMemberName: '',
    newMemberPhone: '',

    masterStops: [
      { id: 'stop1', name: '중앙시장 (태백사거리 방면)', address: '519808 정류소' },
      { id: 'stop2', name: '중부시장입구 (경화성당 방면)', address: '5199818 정류소' },
      { id: 'stop3', name: '경화시장 (염전사거리 방면)', address: '519822 정류소' },
      { id: 'stop4', name: '경화동 (경화역 방면)', address: '518114 정류소' },
      { id: 'stop5', name: '경화역 (진해남중 방면)', address: '518116 정류소' },
      { id: 'stop6', name: '진해남중 (진해세화여고 방면)', address: '518118 정류소' },
      { id: 'stop7', name: '진해세화여고 (롯데마트 방면)', address: '518120 정류소' },
      { id: 'stop8', name: '삼정코아 (두산위브 방면)', address: '516406 정류소' }
    ],

    inputDate: '', 
    inputTime: '18:30',
    inputSeats: 1, 
    inputDriverPhone: '010-', 
    selectedStopIds: [], 
    driverOrderedStops: [],
    inputPassengerPhone: '010-',
    draggedIndex: null,

    // [🚗 실시간 카풀 스케줄 DB] - Firebase 연동
    trips: [],

    selectedTrip: null,
    passengerPickup: '',
    passengerCount: 1,
    
    lastReservedData: null, 
    lastDriverActionData: null, 

    // 🚀 중앙 데이터베이스 실시간 양방향 동기화 코어 엔진
    initSystem() {
      this.inputNotice = this.notice;
      
      const today = new Date();
      this.inputDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      // 1. Firebase로부터 회원 명단(allowedMembers) 실시간 구독 및 동기화
      db.ref('allowedMembers').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          // Firebase 오브젝트 혹은 배열 구조를 정제하여 반영
          this.allowedMembers = Object.values(data);
        } else {
          // DB가 완전히 비어있을 때 초기 테스트용 기본 계정 자동 생성 및 주입
          this.allowedMembers = [
            { id: 'm_default1', name: '홍길동', phoneTail: '1234' },
            { id: 'm_default2', name: '이순신', phoneTail: '5678' },
            { id: 'm_default3', name: '김경화', phoneTail: '0000' }
          ];
          this.syncMembersToFirebase();
        }
      });

      // 2. Firebase로부터 카풀 피드(trips) 실시간 구독 (새로고침 없는 UI 구현)
      db.ref('trips').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          // 실시간 정렬 유지 (최신 등록순)
          let parsedTrips = Object.values(data);
          parsedTrips.sort((a, b) => b.createdAt - a.createdAt);
          this.trips = parsedTrips;

          // 현재 유저가 선택한 세부 트립 객체가 DB에서 갱신되었다면 동시 동기화
          if (this.selectedTrip) {
            const updated = this.trips.find(t => t.id === this.selectedTrip.id);
            if (updated) this.selectedTrip = updated;
          }
        } else {
          this.trips = [];
        }
      });

      this.updateDriverRouteList();
      this.$watch('selectedStopIds', () => this.updateDriverRouteList());
    },

    // 클라우드 데이터베이스 전송 제어 함수
    syncMembersToFirebase() {
      db.ref('allowedMembers').set(this.allowedMembers);
    },

    syncTripsToFirebase() {
      // 배열 전체를 원자적으로 Firebase 클라우드 인프라에 덮어쓰기 동기화
      const dataToSave = {};
      this.trips.forEach(trip => {
        dataToSave[trip.id] = trip;
      });
      db.ref('trips').set(dataToSave);
    },

    getDayOfWeek(dateString) {
      const week = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      const dayIndex = new Date(dateString).getDay();
      return isNaN(dayIndex) ? '' : week[dayIndex];
    },

    get activeTrips() {
      const todayStr = new Date().toISOString().split('T')[0];
      return this.trips.filter(trip => trip.date >= todayStr);
    },

    get myDrivenTrips() {
      if (!this.currentUser) return [];
      return this.trips.filter(trip => trip.driverName === this.currentUser.name);
    },

    tryUserLogin() {
      if (!this.loginName.trim() || !this.loginPhoneTail.trim()) {
        return alert('이름과 전화번호 뒷자리를 입력해 주세요.');
      }
      
      const targetName = this.loginName.trim();
      const targetTail = this.loginPhoneTail.trim();

      const member = this.allowedMembers.find(m => m.name === targetName && m.phoneTail === targetTail);
      
      if (member) {
        this.currentUser = member;
        this.isAdminAuthenticated = false;
        this.isUserLoggedIn = true;
        this.step = 'passenger';
        alert(`🔓 인증 성공! [${member.name}]님 반갑습니다.`);
      } else {
        alert('❌ 승인된 사용자가 아닙니다. 관리자가 등록한 명단 정보와 일치해야 합니다.');
      }
    },

    tryAdminAccess() {
      if (this.adminIdInput.trim() === this.currentAdminId && this.adminPasswordInput === this.currentAdminPassword) {
        this.isAdminAuthenticated = true;
        this.currentUser = { id: 'admin_master', name: '👑 관리자(마스터)', phoneTail: '0000', phone: '010-0000-0000' };
        this.isUserLoggedIn = true;
        this.step = 'admin';
        this.showPasswordModal = false;
        
        this.newAdminId = this.currentAdminId;
        this.newAdminPassword = this.currentAdminPassword;
        this.adminIdInput = '';
        this.adminPasswordInput = '';
        
        alert('👑 마스터 권한으로 원격 관리자 제어실에 진입했습니다.');
      } else {
        alert('❌ 마스터 관리자 인증 정보가 일치하지 않습니다.');
      }
    },

    userLogout() {
      this.isUserLoggedIn = false;
      this.isAdminAuthenticated = false;
      this.currentUser = null;
      this.loginName = '';
      this.loginPhoneTail = '';
      this.lastReservedData = null;
      this.lastDriverActionData = null;
      this.inputDriverPhone = '010-'; 
      this.inputPassengerPhone = '010-';
      this.step = 'passenger';
    },

    updateAdminAccount() {
      if (!this.newAdminId.trim() || !this.newAdminPassword.trim()) {
        return alert('변경할 아이디와 비밀번호를 채워주세요.');
      }
      this.currentAdminId = this.newAdminId.trim();
      this.currentAdminPassword = this.newAdminPassword.trim();
      alert(`⚙️ 관리자 계정 정보가 성공적으로 교체되었습니다.`);
    },

    addAllowedMember() {
      if (!this.newMemberName.trim() || !this.newMemberPhone.trim()) {
        return alert('이름과 전화번호 뒷자리 4자리를 기입해 주세요.');
      }
      
      const memberName = this.newMemberName.trim();
      const memberPhone = this.newMemberPhone.trim();

      if (this.allowedMembers.some(m => m.name === memberName && m.phoneTail === memberPhone)) {
        return alert('⚠️ 이미 명단에 존재합니다.');
      }

      this.allowedMembers.push({
        id: 'm_' + Date.now(),
        name: memberName,
        phoneTail: memberPhone
      });
      
      // 클라우드 DB 즉시 동기화 (원격 저장)
      this.syncMembersToFirebase();

      alert(`👥 멤버 [${memberName}]님이 실시간 클라우드 승인 명단에 등록되었습니다.`);
      this.newMemberName = '';
      this.newMemberPhone = '';
    },

    removeMember(memberId, name) {
      if (!confirm(`🚨 [${name}] 멤버를 명단에서 삭제하시겠습니까?`)) return;
      this.allowedMembers = this.allowedMembers.filter(m => m.id !== memberId);
      
      this.syncMembersToFirebase(); // 원격 DB 반영
      if (this.currentUser && this.currentUser.name === name) this.userLogout();
    },

    updateDriverRouteList() {
      let currentStops = this.masterStops.filter(stop => this.selectedStopIds.includes(stop.id));
      let newOrdered = [];
      this.driverOrderedStops.forEach(os => {
        if (currentStops.some(cs => cs.id === os.id)) newOrdered.push(os);
      });
      currentStops.forEach(cs => {
        if (!newOrdered.some(no => no.id === cs.id)) newOrdered.push(cs);
      });
      this.driverOrderedStops = newOrdered;
    },

    handleDragStart(index, event) {
      this.draggedIndex = index;
      event.dataTransfer.effectAllowed = 'move';
    },

    handleDragOver(index, event) {
      event.preventDefault();
      if (this.draggedIndex === null || this.draggedIndex === index) return;
      
      let targetArray = [...this.driverOrderedStops];
      const draggedItem = targetArray[this.draggedIndex];
      
      targetArray.splice(this.draggedIndex, 1);
      targetArray.splice(index, 0, draggedItem);
      
      this.driverOrderedStops = targetArray;
      this.draggedIndex = index;
    },

    handleDragEnd() {
      this.draggedIndex = null;
    },

    registerTrip() {
      let finalDriverName = this.currentUser.name;
      if (!this.inputDate) return alert('운행 날짜를 선택해 주세요.');
      
      let phoneValue = this.inputDriverPhone.trim();
      if (!phoneValue || phoneValue === '010-') return alert('운전자 연락처를 입력해 주세요.');
      if (this.driverOrderedStops.length === 0) return alert('경유 정류소를 지정해 주세요.');
      
      const todayStr = new Date().toISOString().split('T')[0];
      if (this.inputDate < todayStr) return alert('⚠️ 과거 날짜 카풀은 생성할 수 없습니다.');

      const newTrip = {
        id: 'trip_' + Date.now(),
        createdAt: Date.now(), // 정렬용 타임스탬프
        driverName: finalDriverName,
        driverPhone: phoneValue, 
        date: this.inputDate,
        dayOfWeek: this.getDayOfWeek(this.inputDate), 
        departureTime: this.inputTime,
        totalSeats: parseInt(this.inputSeats),
        remainingSeats: parseInt(this.inputSeats),
        route: JSON.parse(JSON.stringify(this.driverOrderedStops)),
        passengers: []
      };
      
      this.trips.unshift(newTrip);
      this.syncTripsToFirebase(); // 원격 클라우드 DB에 업로드
      
      alert(`🚗 [등록완료] 카풀 피드가 전체 실시간 연동 네트워크에 등록되었습니다.`);
      this.selectedStopIds = [];
      this.inputSeats = 1;
    },

    updateTripSeats(trip, newTotal) {
      newTotal = parseInt(newTotal);
      let approvedSeats = (trip.passengers || [])
        .filter(p => p.status === 'approved')
        .reduce((sum, p) => sum + p.count, 0);

      if (newTotal < approvedSeats) {
        return alert(`❌ 현재 이미 승인 완료된 인원(${approvedSeats}명)보다 적게 좌석을 줄일 수 없습니다.`);
      }

      trip.totalSeats = newTotal;
      trip.remainingSeats = newTotal - approvedSeats;
      this.syncTripsToFirebase(); // 원격 DB 업로드
      alert(`📐 모집 좌석이 총 ${newTotal}석으로 변경되었습니다.`);
    },

    selectTrip(trip) {
      this.selectedTrip = trip;
      this.passengerPickup = ''; 
      this.passengerCount = 1;
      this.inputPassengerPhone = '010-';
    },

    confirmReservation() {
      if (!this.passengerPickup) return alert('탑승할 장소를 선택해 주세요.');
      
      let pPhone = this.inputPassengerPhone.trim();
      if (!pPhone || pPhone === '010-') return alert('동승자 분의 연락처를 입력해 주세요.');
      if (this.selectedTrip.remainingSeats < this.passengerCount) return alert('현재 잔여 좌석이 부족합니다.');
      
      if (!this.selectedTrip.passengers) this.selectedTrip.passengers = [];

      const newPassenger = {
        id: 'ps_' + Date.now(),
        name: this.currentUser.name,
        phone: pPhone,
        count: parseInt(this.passengerCount),
        pickup: this.passengerPickup,
        status: 'pending' 
      };
      
      this.selectedTrip.passengers.push(newPassenger);
      this.syncTripsToFirebase(); // 클라우드 DB 즉시 전송 및 타 이용자 화면 실시간 갱신 trigger

      this.lastReservedData = {
        driverName: this.selectedTrip.driverName,
        driverPhone: this.selectedTrip.driverPhone, 
        date: this.selectedTrip.date,
        time: this.selectedTrip.departureTime,
        passengerName: newPassenger.name,
        count: newPassenger.count,
        pickup: newPassenger.pickup
      };

      alert('🎉 실시간 카풀 탑승 신청이 전송되었습니다.\n[운전자에게 알림 전송] 무선 프로토콜을 사용해 알림을 전달하세요!');
    },

    acceptPassenger(trip, passenger) {
      if (trip.remainingSeats < passenger.count) return alert('❌ 차량 잔여 좌석이 부족하여 수락할 수 없습니다.');
      
      passenger.status = 'approved';
      trip.remainingSeats -= passenger.count;
      this.syncTripsToFirebase(); // 원격 동기화

      this.lastDriverActionData = {
        type: '수락',
        passengerName: passenger.name,
        passengerPhone: passenger.phone,
        date: trip.date,
        time: trip.departureTime,
        pickup: passenger.pickup,
        count: passenger.count,
        driverName: trip.driverName
      };
    },

    rejectPassenger(trip, passenger) {
      if (passenger.status === 'approved') {
        trip.remainingSeats += passenger.count;
      }
      passenger.status = 'rejected';
      this.syncTripsToFirebase(); // 원격 동기화

      this.lastDriverActionData = {
        type: '거절',
        passengerName: passenger.name,
        passengerPhone: passenger.phone,
        date: trip.date,
        time: trip.departureTime,
        pickup: passenger.pickup,
        count: passenger.count,
        driverName: trip.driverName
      };
    },

    sendDriverSms() {
      if (!this.lastDriverActionData) return;
      const d = this.lastDriverActionData;
      const message = `[창원경화카풀] 신청결과\n▶${d.passengerName}님 신청 건\n▶일시: ${d.date} (${d.time})\n▶결과: 카풀 탑승이 [${d.type}] 되었습니다.\n- 운전자: ${d.driverName}`;
      window.location.href = `sms:${d.passengerPhone}?body=${encodeURIComponent(message)}`;
    },

    copyDriverKakaoText() {
      if (!this.lastDriverActionData) return;
      const d = this.lastDriverActionData;
      const message = `[창원경화카풀 알림]\n• ${d.passengerName}님 카풀 신청이 [${d.type}] 되었습니다.\n• 일시: ${d.date} [${d.time}]\n• 픽업지: ${d.pickup} (${d.count}명)\n\n카톡방에 붙여넣어 결과를 공유해 주세요!`;
      navigator.clipboard.writeText(message).then(() => alert('📋 카톡 공유용 내용이 복사되었습니다!')).catch(() => alert('복사 실패'));
    },

    sendSmsNotification() {
      if (!this.lastReservedData) return;
      const d = this.lastReservedData;
      const message = `[창원경화카풀] 예약요청\n▶운전자: ${d.driverName}님\n▶운행일시: ${d.date} (${d.time})\n▶탑승신청자: ${d.passengerName} (${d.count}명)\n▶픽업장소: ${d.pickup}\n\n매칭 승인 대기 중입니다. 앱에서 확인 후 수락 부탁드립니다!`;
      window.location.href = `sms:${d.driverPhone}?body=${encodeURIComponent(message)}`;
    },

    copyKakaoText() {
      if (!this.lastReservedData) return;
      const d = this.lastReservedData;
      const message = `[창원경화카풀 탑승요청]\n• 운전자: ${d.driverName}님\n• 일시: ${d.date} [${d.time}]\n• 동승자: ${d.passengerName} (${d.count}명)\n• 픽업지: ${d.pickup}\n\n운전자님 앱에서 확인 후 [수락] 버튼을 눌러주세요!`;
      navigator.clipboard.writeText(message).then(() => alert('📋 클립보드에 복사되었습니다!')).catch(() => alert('복사 실패'));
    },

    cancelPassengerBooking(trip, passenger, isAdminAction = false) {
      if (!confirm(isAdminAction ? `🚨 [관리자 조치] 예약을 강제 취소할까요?` : '작성하신 탑승 신청을 취소하시겠습니까?')) return;
      
      if (passenger.status === 'approved') {
        trip.remainingSeats += passenger.count;
      }
      
      trip.passengers = (trip.passengers || []).filter(p => p.id !== passenger.id);
      if (this.selectedTrip && this.selectedTrip.id === trip.id) this.selectedTrip = null;
      this.lastReservedData = null;
      
      this.syncTripsToFirebase(); // 원격 동기화 제거 반영
      alert('❌ 탑승 신청 취소가 정상 처리되었습니다.');
    },

    driverResetAction() {
      this.lastDriverActionData = null;
    },

    cancelDriverTrip(trip, isAdminAction = false) {
      if (!confirm(isAdminAction ? `🚨 [관리자 조치] 카풀 일정을 원격 파기할까요?` : '등록하신 카풀 전체 일정을 취소(파기)하시겠습니까?')) return;
      this.trips = this.trips.filter(t => t.id !== trip.id);
      this.selectedTrip = null;
      this.lastReservedData = null;
      this.lastDriverActionData = null;
      
      this.syncTripsToFirebase(); // 원격 DB 파기 반영
      alert('❌ 카풀 등록 일정이 완전히 파기되었습니다.');
    }
  }" x-init="initSystem()" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col h-[880px] relative">

    <!-- 상단 앱 브랜딩 바 -->
    <div class="bg-gray-900 text-white px-4 py-3 flex justify-between items-center text-xs">
      <div class="flex items-center gap-2 w-full">
        <span class="text-emerald-400 font-black tracking-wider text-sm">🚗 창원경화카풀 🌐클라우드</span>
        <div class="flex items-center gap-2 ml-auto" x-show="isUserLoggedIn">
          <span class="text-gray-300 font-bold" x-text="`👤 ${currentUser?.name}님`"></span>
          <button @click="userLogout()" class="bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded text-[10px] cursor-pointer">로그아웃</button>
        </div>
      </div>
    </div>

    <!-- ==================== [🚪 CASE A. 로그아웃 상태의 대기 게이트웨이] ==================== -->
    <template x-if="!isUserLoggedIn">
      <div class="flex-1 flex flex-col justify-center items-center p-6 space-y-6 bg-gray-50">
        <div class="text-center space-y-2">
          <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center text-2xl mx-auto shadow-xs">🌐</div>
          <h2 class="text-lg font-black text-gray-900">창원경화카풀 실시간 네트워크</h2>
          <p class="text-xs text-gray-500 leading-relaxed">
            클라우드 데이터베이스와 양방향 연동 중입니다.<br>
            인증 완료된 크루원만 진입할 수 있습니다.
          </p>
          <div class="bg-blue-50 p-2 text-[10px] text-blue-800 rounded-lg font-bold">
            💡 초기 테스트 기본 계정: 홍길동 (1234) / 이순신 (5678)
          </div>
        </div>

        <div class="w-full bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-3.5">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">성명(실명)</label>
            <input type="text" x-model="loginName" placeholder="예: 홍길동" class="w-full p-2.5 text-xs border border-gray-200 rounded-xl font-bold bg-gray-50 focus:bg-white focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">전화번호 뒷자리 (4자리)</label>
            <input type="password" maxlength="4" x-model="loginPhoneTail" placeholder="예: 1234" class="w-full p-2.5 text-xs border border-gray-200 rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:outline-none" @keydown.enter="tryUserLogin()">
          </div>
          <button @click="tryUserLogin()" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl text-xs shadow-md cursor-pointer">
            멤버 인증 및 로그인
          </button>
        </div>

        <button @click="showPasswordModal = true" class="text-xs text-gray-400 underline font-medium cursor-pointer">
          ⚙️ 시스템 관리자 모드 진입
        </button>
      </div>
    </template>

    <!-- ==================== [📱 CASE B. 정상 연동 가동 상태 메인 인터페이스] ==================== -->
    <template x-if="isUserLoggedIn">
      <div class="flex-1 flex flex-col overflow-hidden">
        
        <!-- 대메뉴 탭 릴레이 -->
        <div class="flex border-b border-gray-100 bg-gray-50 p-2 gap-1 shrink-0">
          <button x-show="isAdminAuthenticated" @click="step = 'admin';" 
                  :class="step === 'admin' ? 'bg-red-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold transition-all text-xs cursor-pointer">
            ⚙️ 관리자 데스크 <span class="text-[10px] text-red-200">(ON)</span>
          </button>
          <button @click="step = 'driver'; driverResetAction();" :class="step === 'driver' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold transition-all text-xs cursor-pointer">
            👨‍✈️ 운전자 모드
          </button>
          <button @click="step = 'passenger'; selectedTrip = null; lastReservedData = null;" :class="step === 'passenger' ? 'bg-emerald-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold transition-all text-xs cursor-pointer">
            🙋‍♀️ 동승자 모드
          </button>
        </div>

        <!-- 필수 고정 요구 공지 배너 -->
        <div class="bg-amber-50 border-b border-amber-100 px-4 py-2.5 text-xs text-amber-800 font-bold text-center shrink-0" x-show="notice">
          <div x-text="notice"></div>
        </div>

        <!-- 스크롤 컨테이너 코어 -->
        <div class="flex-1 overflow-y-auto p-5 space-y-5">

          <!-- 👑 [🛠️ 1. 관리자 전용 마스터 컨트롤 본문] -->
          <template x-if="step === 'admin' && isAdminAuthenticated">
            <div class="space-y-4">
              
              <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl border border-red-100">
                <div>
                  <h2 class="text-xs font-black text-red-900">👑 최고 관리자 통제 제어실</h2>
                  <p class="text-[10px] text-red-600 mt-0.5">실시간 화이트리스트 동기화 작동 중</p>
                </div>
                <button @click="userLogout()" class="bg-gray-800 text-white text-[10px] font-bold px-2 py-1 rounded cursor-pointer">제어실 로그아웃</button>
              </div>

              <!-- 관리자 계정정보 변경 패널 -->
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-3 shadow-xs">
                <span class="text-xs font-black text-red-600 block">🔒 관리자 마스터 계정 정보 변경</span>
                <div class="grid grid-cols-2 gap-2 text-xs">
                  <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-1">새 마스터 ID</label>
                    <input type="text" x-model="newAdminId" class="w-full p-2 border rounded-lg bg-gray-50 font-bold">
                  </div>
                  <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-1">새 마스터 PW</label>
                    <input type="text" x-model="newAdminPassword" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-center">
                  </div>
                </div>
                <button @click="updateAdminAccount()" class="w-full bg-red-600 text-white font-black py-2 rounded-lg text-xs tracking-wide cursor-pointer">
                  ⚙️ 마스터 계정 정보 교체
                </button>
              </div>

              <!-- 화이트리스트 회원 관리 섹션 -->
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-3">
                <span class="text-xs font-black text-gray-800 block">👥 카풀 이용 허가 회원 명단 통제 (실시간 원격 반영)</span>
                <div class="grid grid-cols-2 gap-2 text-xs">
                  <input type="text" x-model="newMemberName" placeholder="승인할 실명" class="p-2 border rounded-lg bg-gray-50 font-bold">
                  <input type="text" maxlength="4" x-model="newMemberPhone" placeholder="뒷4자리" class="p-2 border rounded-lg bg-gray-50 text-center font-bold">
                </div>
                <button @click="addAllowedMember()" class="w-full bg-gray-900 text-white font-bold py-2 rounded-lg text-xs cursor-pointer">
                  ➕ 신규 명단 승인 등록
                </button>

                <div class="border-t border-gray-100 pt-2 space-y-1 max-h-36 overflow-y-auto">
                  <template x-if="allowedMembers.length === 0">
                    <div class="text-center py-4 text-[11px] text-gray-400">등록된 허가 회원이 없습니다.</div>
                  </template>
                  <template x-for="m in allowedMembers" :key="m.id">
                    <div class="flex justify-between items-center text-xs p-1.5 bg-gray-50 rounded">
                      <span class="font-bold text-gray-700" x-text="`• ${m.name} (${m.phoneTail})`"></span>
                      <button @click="removeMember(m.id, m.name)" class="text-[10px] text-red-500 font-bold px-2 py-0.5 rounded cursor-pointer">허가취소</button>
                    </div>
                  </template>
                </div>
              </div>

              <!-- 전체 실시간 배차 관리 테이블 -->
              <div class="space-y-2">
                <label class="text-xs font-black text-gray-800 block">📋 [전역 클라우드] 스케줄 및 예약 강제 조정</label>
                <div class="space-y-2">
                  <template x-for="trip in trips" :key="trip.id">
                    <div class="p-3 bg-white border border-gray-200 rounded-xl space-y-2 text-xs">
                      <div class="flex justify-between items-center">
                        <span class="font-extrabold text-gray-900" x-text="`🚗 운전자: ${trip.driverName} (${trip.date})`"></span>
                        <button @click="cancelDriverTrip(trip, true)" class="bg-red-600 text-white px-2 py-0.5 rounded text-[10px] font-bold cursor-pointer">운행 파기</button>
                      </div>
                      <div class="space-y-1 pt-1 border-t border-dashed border-gray-100">
                        <template x-for="p in trip.passengers || []" :key="p.id">
                          <div class="flex justify-between items-center bg-red-50/50 p-1 rounded">
                            <span class="text-gray-700 text-[11px]" x-text="`• ${p.name} [${p.status}] - 연락처: ${p.phone}`"></span>
                            <button @click="cancelPassengerBooking(trip, p, true)" class="text-[10px] text-red-600 font-bold cursor-pointer">취소조치</button>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

            </div>
          </template>

          <!-- [👨‍✈️ 2. 운전자 모드] -->
          <template x-if="step === 'driver'">
            <div class="space-y-4">
              <div>
                <h2 class="text-base font-black text-gray-900">👨‍✈️ 운전자 카풀 등록 및 관리</h2>
                <p class="text-xs text-blue-600 mt-0.5 font-bold" x-text="`등록 계정주: ${currentUser?.name}`"></p>
              </div>

              <!-- 운전자 입력 폼 -->
              <div class="bg-gray-50 p-3.5 rounded-xl border border-gray-100 space-y-2.5 text-xs">
                <div class="bg-blue-50 p-2.5 rounded-lg border border-blue-100">
                  <label class="block font-black text-blue-900 mb-1">📞 운전자 본인 연락처</label>
                  <input type="tel" x-model="inputDriverPhone" placeholder="010-1234-5678" class="w-full p-2 border border-blue-200 rounded-lg bg-white font-bold text-gray-800 focus:outline-none">
                </div>

                <div>
                  <label class="block font-bold text-gray-500 mb-1">📅 운행 일자 선택</label>
                  <input type="date" x-model="inputDate" class="w-full p-2 border border-gray-200 rounded-lg bg-white font-bold">
                </div>
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <label class="block font-bold text-gray-500 mb-1">⏰ 시간</label>
                    <input type="time" x-model="inputTime" class="w-full p-2 border border-gray-200 rounded-lg bg-white">
                  </div>
                  <div>
                    <label class="block font-bold text-gray-500 mb-1">👥 초기 모집 좌석</label>
                    <select x-model="inputSeats" class="w-full p-2 border border-gray-200 rounded-lg bg-white font-bold">
                      <option value="1" selected>1석</option><option value="2">2석</option><option value="3">3석</option><option value="4">4석</option><option value="5">5석</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- 정류소 설정 패널 -->
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 block">☑️ 경유할 픽업 정류소 선택</label>
                <div class="grid grid-cols-1 gap-1 max-h-24 overflow-y-auto bg-gray-50 p-2 rounded-xl border border-gray-100">
                  <template x-for="stop in masterStops" :key="stop.id">
                    <label class="flex items-center gap-2 p-1 bg-white rounded border border-gray-50 cursor-pointer text-xs">
                      <input type="checkbox" :value="stop.id" x-model="selectedStopIds" class="w-3.5 h-3.5 text-blue-600 rounded">
                      <span class="font-bold text-gray-700 truncate" x-text="stop.name"></span>
                    </label>
                  </template>
                </div>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 block">🔄 경유 순서 설정 <span class="text-[10px] text-gray-400 font-normal ml-1">(☰ 드래그 가능)</span></label>
                <div class="space-y-1 max-h-24 overflow-y-auto bg-gray-50 p-2 rounded-xl border border-gray-100 border-dashed">
                  <template x-for="(stop, index) in driverOrderedStops" :key="stop.id">
                    <div class="flex items-center gap-2 p-1 bg-white border border-gray-200 rounded text-xs select-none"
                         @dragover="handleDragOver(index, $event)">
                      <div draggable="true" @dragstart="handleDragStart(index, $event)" @dragend="handleDragEnd()" class="cursor-grab text-gray-400 px-1 font-bold">☰</div>
                      <span class="font-black text-blue-600" x-text="`${index + 1}.`"></span>
                      <span class="font-bold text-gray-800 truncate" x-text="stop.name"></span>
                    </div>
                  </template>
                </div>
              </div>

              <button @click="registerTrip()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl text-xs shadow-md cursor-pointer">
                ⚡ 새로운 카풀 스케줄 운행 등록 (네트워크 전송)
              </button>

              <hr class="border-gray-100">

              <!-- 카풀 관리 섹션 -->
              <div class="space-y-2">
                <h3 class="text-xs font-black text-gray-800">📥 클라우드 수신 신청 관리</h3>
                <div class="space-y-2.5 max-h-[340px] overflow-y-auto">
                  <template x-if="myDrivenTrips.length === 0">
                    <div class="text-center py-6 text-[11px] text-gray-400 bg-gray-50 rounded-xl border">등록한 운행 스케줄이 없습니다.</div>
                  </template>
                  <template x-for="trip in myDrivenTrips" :key="trip.id">
                    <div class="p-3 bg-blue-50/60 border border-blue-200 rounded-xl space-y-2 text-xs">
                      
                      <div class="flex flex-col gap-1.5 pb-2 border-b border-dashed border-blue-200">
                        <div class="flex justify-between items-center">
                          <span class="font-black text-blue-900" x-text="`📅 ${trip.date} (${trip.departureTime})`"></span>
                          <button @click="cancelDriverTrip(trip)" class="bg-red-600 text-white px-2 py-0.5 rounded text-[10px] font-bold cursor-pointer">내 운행 취소</button>
                        </div>
                        
                        <div class="flex justify-between items-center bg-white p-1.5 rounded border border-blue-100 text-[11px]">
                          <span class="font-bold text-gray-600">⚙️ 모집 총 좌석 변경 :</span>
                          <div class="flex items-center gap-1">
                            <select :value="trip.totalSeats" @change="updateTripSeats(trip, $event.target.value)" class="bg-gray-50 border border-gray-300 rounded px-1 text-[11px] font-black">
                              <option value="1">1석</option><option value="2">2석</option><option value="3">3석</option><option value="4">4석</option><option value="5">5석</option>
                            </select>
                            <span class="font-bold text-blue-700" x-text="`(현재 잔여: ${trip.remainingSeats}석)`"></span>
                          </div>
                        </div>
                      </div>
                      
                      <div class="space-y-2">
                        <template x-if="!trip.passengers || trip.passengers.length === 0">
                          <div class="text-[10px] text-gray-400 py-1 text-center">동승 탑승 신청이 전역 대기열에 없습니다.</div>
                        </template>
                        <template x-for="p in trip.passengers || []" :key="p.id">
                          <div class="bg-white p-2.5 rounded-xl border border-gray-200 flex flex-col gap-1.5 shadow-xs">
                            <div class="flex justify-between items-center">
                              <span class="font-black text-gray-800" x-text="`🙋‍♀️ ${p.name} (${p.count}명)`"></span>
                              <span class="text-[10px] font-bold px-1.5 py-0.2 rounded"
                                    :class="p.status === 'pending' ? 'bg-amber-100 text-amber-800' : p.status === 'approved' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'"
                                    x-text="p.status === 'pending' ? '승인 대기' : p.status === 'approved' ? '수락됨' : '거절됨'"></span>
                            </div>
                            <div class="text-[10px] text-gray-500" x-text="`📱 연락처: ${p.phone} | 📍 픽업: ${p.pickup}`"></div>
                            
                            <div class="flex gap-1 pt-0.5">
                              <button @click="rejectPassenger(trip, p)" 
                                      :class="p.status === 'rejected' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-700 border'"
                                      class="flex-1 py-1 rounded-lg text-[11px] font-bold transition-all cursor-pointer">
                                거절
                              </button>
                              <button @click="acceptPassenger(trip, p)" 
                                      :class="p.status === 'approved' ? 'bg-emerald-600 text-white' : 'bg-blue-600 text-white'"
                                      class="flex-1 py-1 rounded-lg text-[11px] font-bold transition-all cursor-pointer">
                                수락
                              </button>
                            </div>

                            <template x-if="lastDriverActionData && lastDriverActionData.passengerName === p.name">
                              <div class="bg-slate-900 text-white p-2.5 rounded-lg space-y-2 mt-1 border border-slate-700">
                                <div class="flex justify-between items-center">
                                  <span class="text-[10px] font-bold text-yellow-400" x-text="`📢 [${lastDriverActionData.type}] 메시지 알림`"></span>
                                  <button @click="driverResetAction()" class="text-gray-400 text-[10px] px-1 cursor-pointer">✕ 닫기</button>
                                </div>
                                <div class="grid grid-cols-2 gap-1.5">
                                  <button @click="sendDriverSms()" class="bg-blue-600 text-white text-[10px] font-black py-1.5 rounded-md cursor-pointer">
                                    💬 문자 전송
                                  </button>
                                  <button @click="copyDriverKakaoText()" class="bg-yellow-500 text-gray-950 text-[10px] font-black py-1.5 rounded-md cursor-pointer">
                                    💛 카톡 복사
                                  </button>
                                </div>
                              </div>
                            </template>

                          </div>
                        </template>
                      </div>

                    </div>
                  </template>
                </div>
              </div>

            </div>
          </template>

          <!-- [🙋‍♀️ 3. 동승자 모드: 피드 목록] -->
          <template x-if="step === 'passenger' && !selectedTrip">
            <div class="space-y-4">
              <h2 class="text-base font-black text-gray-900">🚗 실시간 운행 카풀 피드 목록</h2>

              <template x-if="lastReservedData">
                <div class="bg-emerald-950 text-white p-4 rounded-2xl border-2 border-emerald-400 space-y-3 shadow-lg">
                  <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-emerald-300">📱 실시간 탑승 신청 알림 전송</span>
                    <button @click="lastReservedData = null" class="text-gray-400 text-xs cursor-pointer">✕ 닫기</button>
                  </div>
                  <p class="text-[11px] text-gray-200 leading-relaxed">
                    신청 정보가 클라우드 데이터베이스에 실시간 기록되었습니다.<br>
                    운전자에게 다이렉트 예약 확인 무선 메시지를 즉시 알리세요.
                  </p>
                  <div class="grid grid-cols-2 gap-2">
                    <button @click="sendSmsNotification()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black py-2 rounded-xl transition-all cursor-pointer">
                      💬 문자 알림 전송
                    </button>
                    <button @click="copyKakaoText()" class="bg-yellow-500 hover:bg-yellow-600 text-gray-950 text-xs font-black py-2 rounded-xl transition-all cursor-pointer">
                      💛 카톡용 복사
                    </button>
                  </div>
                </div>
              </template>

              <div class="space-y-2">
                <template x-if="activeTrips.length === 0">
                  <div class="text-center py-12 bg-gray-50 border border-dashed rounded-2xl border-gray-200 text-gray-400 text-xs">
                    현재 실시간 동기화 풀에 등록된 카풀 일정이 없습니다.
                  </div>
                </template>

                <template x-for="trip in activeTrips" :key="trip.id">
                  <div class="p-4 bg-white border border-gray-200 rounded-xl space-y-2.5 shadow-xs">
                    <div class="flex justify-between items-start text-xs">
                      <div>
                        <span class="bg-emerald-50 text-emerald-700 font-black px-2 py-0.5 rounded text-[10px]" x-text="`${trip.date} (${trip.dayOfWeek})`"></span>
                        <h3 class="font-extrabold text-gray-800 mt-1" x-text="`운전자: ${trip.driverName}`"></h3>
                        <p class="text-[10px] text-gray-400" x-text="`운전자 연락처: ${trip.driverPhone}`"></p>
                      </div>
                      <span class="font-black text-blue-600 bg-blue-50 px-2 py-1 rounded text-[11px]" x-text="`${trip.departureTime} 출발`"></span>
                    </div>

                    <div class="flex flex-wrap items-center gap-1 text-[10px] text-gray-500 bg-gray-50 p-2 rounded-lg border border-gray-100">
                      <template x-for="(st, idx) in trip.route" :key="st.id">
                        <div class="flex items-center gap-0.5">
                          <span class="font-bold text-gray-700 bg-white px-1.5 py-0.5 rounded border border-gray-100" x-text="st.name"></span>
                          <span x-show="idx < trip.route.length - 1" class="text-gray-300 font-bold">→</span>
                        </div>
                      </template>
                    </div>

                    <div class="pt-1 space-y-1">
                      <template x-for="p in (trip.passengers || []).filter(ps => ps.name === currentUser.name)" :key="p.id">
                        <div class="flex justify-between items-center p-2 rounded text-[11px] font-bold"
                             :class="p.status === 'approved' ? 'bg-emerald-50 text-emerald-800' : p.status === 'rejected' ? 'bg-red-50 text-red-600' : 'bg-amber-50 text-amber-800'">
                          <span x-text="p.status === 'pending' ? '⏳ 내 신청: 매칭 대기 중' : p.status === 'approved' ? '✅ 내 신청: 매칭 수락됨🎉' : '❌ 내 신청: 매칭 거절됨'"></span>
                          <button @click="cancelPassengerBooking(trip, p)" class="bg-gray-800 text-white font-normal text-[9px] px-2 py-0.5 rounded cursor-pointer">취소하기</button>
                        </div>
                      </template>

                      <div class="flex justify-between items-center mt-1">
                        <span class="text-[11px] text-gray-500 font-bold" x-text="`예약 점유 상황: ${trip.totalSeats - trip.remainingSeats} / 총 ${trip.totalSeats}석`"></span>
                        <button @click="selectTrip(trip)" class="bg-emerald-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs cursor-pointer">탑승 신청하기</button>
                      </div>
                    </div>

                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- [🙋‍♀️ 동승자 모드: 세부 픽업 확정 룸] -->
          <template x-if="step === 'passenger' && selectedTrip">
            <div class="space-y-4">
              <button @click="selectedTrip = null;" class="text-gray-400 text-xs bg-gray-100 px-2 py-1 rounded-md cursor-pointer">← 목록 돌아가기</button>

              <div class="p-3 bg-emerald-50 rounded-xl text-xs">
                <div class="font-bold text-emerald-800" x-text="`${selectedTrip.date} | ${selectedTrip.departureTime} 출발`"></div>
                <div class="text-sm font-black text-emerald-950 mt-0.5" x-text="`운전자: ${selectedTrip.driverName}`"></div>
              </div>

              <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-200 space-y-1">
                <label class="block text-xs font-black text-emerald-900">📞 동승자(본인) 휴대폰 번호 입력</label>
                <input type="tel" x-model="inputPassengerPhone" placeholder="010-0000-0000" class="w-full p-2 text-xs border border-emerald-300 rounded-lg bg-white font-bold text-gray-800 focus:outline-none">
                <span class="text-[9px] text-emerald-700 block font-medium">※ 매칭 최종 승인 시 연락을 주고받을 휴대폰 연락처 정보입니다.</span>
              </div>

              <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 flex justify-between items-center text-xs">
                <label class="font-bold text-gray-700">👥 동반 인원 포함 수량</label>
                <select x-model="passengerCount" class="bg-white border p-1 rounded-lg font-bold text-gray-700">
                  <option value="1">1명 (본인)</option><option value="2">2명</option><option value="3">3명</option>
                </select>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 block">👋 희망 픽업 정류소 선택</label>
                <div class="space-y-1 max-h-48 overflow-y-auto pr-1">
                  <template x-for="stop in selectedTrip.route" :key="stop.id">
                    <label :class="passengerPickup === stop.name ? 'border-emerald-600 bg-emerald-50' : 'border-gray-200'" 
                           class="flex items-center gap-2.5 p-2.5 border rounded-xl cursor-pointer text-xs bg-white hover:bg-gray-50">
                      <input type="radio" name="p_pickup_v23" :value="stop.name" x-model="passengerPickup" class="w-3.5 h-3.5 text-emerald-600">
                      <div class="flex-1 min-w-0">
                        <span class="font-extrabold text-gray-800 block truncate" x-text="stop.name"></span>
                        <p class="text-[10px] text-gray-400 truncate" x-text="stop.address"></p>
                      </div>
                    </label>
                  </template>
                </div>
              </div>

              <button @click="confirmReservation(); selectedTrip = null;" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-xs shadow-md cursor-pointer">
                ⚡ 최종 카풀 탑승 신청 완료
              </button>
            </div>
          </template>

        </div>
      </div>
    </template>

    <!-- 관리자 복합 인증 모달 레이어 -->
    <div x-show="showPasswordModal" class="absolute inset-0 bg-black/60 flex justify-center items-center p-6 z-50" x-transition>
      <div class="bg-white rounded-2xl p-5 w-full max-w-xs space-y-3 shadow-2xl">
        <div class="text-center">
          <span class="text-xl">🔒</span>
          <h3 class="text-xs font-black text-gray-900 mt-1">시스템 관리자 총괄 인증</h3>
        </div>
        <div class="space-y-2">
          <input type="text" x-model="adminIdInput" placeholder="관리자 ID" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:bg-white focus:outline-none">
          <input type="password" x-model="adminPasswordInput" @keydown.enter="tryAdminAccess()" placeholder="관리자 비밀번호" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:bg-white focus:outline-none">
        </div>
        <div class="flex gap-2 pt-1">
          <button @click="showPasswordModal = false; adminIdInput=''; adminPasswordInput='';" class="flex-1 bg-gray-200 text-gray-600 font-bold py-1.5 rounded-lg text-xs cursor-pointer">닫기</button>
          <button @click="tryAdminAccess()" class="flex-1 bg-red-600 text-white font-bold py-1.5 rounded-lg text-xs cursor-pointer">보안인증</button>
        </div>
      </div>
    </div>

    <!-- 하단 바 -->
    <div class="p-2.5 bg-gray-50 border-t border-gray-100 text-center text-[10px] text-gray-400 font-semibold shrink-0">
      창원경화카풀 클라우드 실시간 데이터 레이어 v23 © 2026
    </div>
  </div>

</body>
</html>
