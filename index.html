<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>창원경화카풀 시스템 v30</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // 🛠️ 본인의 Firebase 프로젝트 정보입니다.
        const firebaseConfig = {
  apiKey: "AIzaSyAr6TlLN5_SPZwfnGgyxQkR3zQrtPIbOKg",
  authDomain: "changwongyeonghwa-carpool.firebaseapp.com",
  databaseURL: "https://changwongyeonghwa-carpool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "changwongyeonghwa-carpool",
  storageBucket: "changwongyeonghwa-carpool.firebasestorage.app",
  messagingSenderId: "595964487926",
  appId: "1:595964487926:web:fff99d69b0b05bb04ee4d7",
  measurementId: "G-K6XS5LF6XV"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-4 selection:bg-emerald-200">

    <div x-data="{
        step: 'passenger',
        notice: '📢 운전자와 동승자가 여러 차례 충분한 의사 소통을 하세요.',
        isUserLoggedIn: false,
        loginName: '',
        loginPhoneTail: '',
        currentUser: null,
        isAdminAuthenticated: false,
        adminIdInput: '',
        adminPasswordInput: '',
        currentAdminId: 'admin',
        currentAdminPassword: '1914',
        newAdminId: '',
        newAdminPassword: '',
        showPasswordModal: false,
        
        // [🔔 실시간 알림 상태]
        toastMessage: '',
        showToast(msg) {
            this.toastMessage = msg;
            setTimeout(() => { this.toastMessage = ''; }, 4000);
        },

        // [⏱️ 세션 및 회원]
        sessionTimeoutMins: 180,
        allowedMembers: [],
        newMemberName: '',
        newMemberPhone: '',
        showInAppPwChange: false,
        newInAppPw: '',

        // [📍 정류소 마스터]
        masterStops: [],
        newStopName: '',
        
        // [🚗 카풀 등록/수정 폼 변수]
        isEditingMode: false,
        editingTripId: null,
        inputDate: '',
        inputTime: '18:30',
        inputSeats: 1,
        inputDirection: '가는편', // '가는편' 또는 '오는편'
        inputDriverPhone: '010-',
        selectedStopIds: [],
        driverOrderedStops: [],
        inputPassengerPhone: '010-',

        // 드래그앤드롭 핸들 전용 상태 변수
        draggedIndex: null,
        touchStartY: 0,
        currentTouchIndex: null,
        draggedAdminIndex: null,
        touchAdminStartY: 0,
        currentTouchAdminIndex: null,

        // [🚗 카풀 데이터]
        trips: [],
        selectedTrip: null,
        passengerPickup: '',
        passengerCount: 1,
        lastReservedData: null,
        lastDriverActionData: null,

        initSystem() {
            const today = new Date();
            this.inputDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            db.ref('systemNotice').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) this.notice = data;
            });

            db.ref('adminAccount').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    this.currentAdminId = data.id || 'admin';
                    this.currentAdminPassword = data.password || '1914';
                }
            });

            db.ref('sessionTimeoutMins').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data !== null) this.sessionTimeoutMins = parseInt(data);
                this.checkLoginSession();
            });

            db.ref('allowedMembers').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    this.allowedMembers = Object.values(data).map(m => ({
                        id: String(m.id),
                        name: String(m.name).trim(),
                        phoneTail: String(m.phoneTail).trim()
                    }));
                    // 로그인 중인 회원 정보 최신화
                    if(this.currentUser && this.isUserLoggedIn && !this.isAdminAuthenticated) {
                        const updatedMe = this.allowedMembers.find(m => m.id === this.currentUser.id);
                        if(updatedMe) this.currentUser = updatedMe;
                    }
                } else {
                    this.allowedMembers = [
                        { id: 'm_1', name: '홍길동', phoneTail: '1234' },
                        { id: 'm_2', name: '이순신', phoneTail: '5678' },
                        { id: 'm_3', name: '김경화', phoneTail: '0000' }
                    ];
                    this.syncMembersToFirebase();
                }
            });

            db.ref('masterStops').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    let parsedStops = Object.values(data).map(s => ({
                        id: String(s.id),
                        name: String(s.name).trim(),
                        sortOrder: s.sortOrder !== undefined ? parseInt(s.sortOrder) : 999
                    }));
                    parsedStops.sort((a, b) => a.sortOrder - b.sortOrder);
                    this.masterStops = parsedStops;
                } else {
                    this.masterStops = [
                        { id: 'stop1', name: '중앙시장 (태백사거리 방면)', sortOrder: 0 },
                        { id: 'stop2', name: '중부시장입구 (경화성당 방면)', sortOrder: 1 },
                        { id: 'stop3', name: '경화시장 (염전사거리 방면)', sortOrder: 2 },
                        { id: 'stop4', name: '경화동 (경화역 방면)', sortOrder: 3 },
                        { id: 'stop5', name: '경화역 (진해남중 방면)', sortOrder: 4 },
                        { id: 'stop6', name: '진해남중 (진해세화여고 방면)', sortOrder: 5 },
                        { id: 'stop7', name: '진해세화여고 (롯데마트 방면)', sortOrder: 6 },
                        { id: 'stop8', name: '삼정코아 (두산위브 방면)', sortOrder: 7 }
                    ];
                    this.syncMasterStopsToFirebase();
                }
            });

            // 🚗 카풀 목록 실시간 연동 및 만료 데이터 자동 필터링
            db.ref('trips').on('value', (snapshot) => {
                const data = snapshot.val();
                const todayStr = new Date().toISOString().split('T')[0];
                if (data) {
                    let parsedTrips = Object.values(data);
                    // 당일 및 미래 날짜 카풀만 유지 (과거 날짜 자동 삭제/제외)
                    this.trips = parsedTrips.filter(trip => trip.date >= todayStr);
                    this.trips.sort((a, b) => b.createdAt - a.createdAt);

                    if (this.selectedTrip) {
                        const updated = this.trips.find(t => t.id === this.selectedTrip.id);
                        if (updated) this.selectedTrip = updated;
                    }
                } else {
                    this.trips = [];
                }
            });

            // 🔔 [강화된 실시간 알림 체계] 카풀 변경 감지 스 listen
            db.ref('trips').on('child_changed', (snapshot) => {
                const updatedTrip = snapshot.val();
                if (!updatedTrip || !this.isUserLoggedIn) return;

                // 1. 운전자가 자신인 경우: 새로운 동승자 신청 알림
                if (updatedTrip.driverName === this.currentUser.name) {
                    this.showToast('🚗 내 카풀 노선에 새로운 예약/변경 사항이 접수되었습니다!');
                }
                // 2. 동승자가 자신인 경우: 수락/거절 상태 변경 확인 알림
                if (updatedTrip.passengers) {
                    const myReservation = Object.values(updatedTrip.passengers).find(p => p.name === this.currentUser.name);
                    if (myReservation) {
                        this.showToast(`📱 [${updatedTrip.driverName}] 운전자가 카풀 예약을 처리했습니다. 현황을 확인하세요!`);
                    }
                }
            });
        },

        checkLoginSession() {
            const sessionData = localStorage.getItem('carpool_session');
            if (!sessionData) return;
            try {
                const session = JSON.parse(sessionData);
                const now = Date.now();
                const diffMins = (now - session.loginTime) / (1000 * 60);
                if (diffMins > this.sessionTimeoutMins) {
                    this.userLogout();
                    alert('⏱️ 세션 유지 시간이 만료되어 자동 로그아웃 되었습니다.');
                } else {
                    this.currentUser = session.user;
                    this.isAdminAuthenticated = session.isAdmin || false;
                    this.isUserLoggedIn = true;
                    this.step = this.isAdminAuthenticated ? 'admin' : 'passenger';
                }
            } catch (e) {
                this.userLogout();
            }
        },

        saveSessionToStorage(user, isAdmin = false) {
            const sessionObj = { user: user, isAdmin: isAdmin, loginTime: Date.now() };
            localStorage.setItem('carpool_session', JSON.stringify(sessionObj));
        },

        rebuildDriverRoute() {
            let currentStops = this.masterStops.filter(stop => this.selectedStopIds.includes(stop.id));
            let newOrdered = [];
            this.driverOrderedStops.forEach(os => {
                if (currentStops.some(cs => cs.id === os.id)) newOrdered.push(os);
            });
            currentStops.forEach(cs => {
                if (!newOrdered.some(no => no.id === cs.id)) newOrdered.push(cs);
            });
            this.driverOrderedStops = newOrdered;
        },

        // 👨‍✈️ 운전자 노선 드래그앤드롭 조작 (정류소 핸들 전용 영역 제어)
        handleDragStart(index, event) { this.draggedIndex = index; event.dataTransfer.effectAllowed = 'move'; },
        handleDragOver(index, event) { event.preventDefault(); if (this.draggedIndex === null || this.draggedIndex === index) return; this.swapRouteItems(this.draggedIndex, index); this.draggedIndex = index; },
        handleDragEnd() { this.draggedIndex = null; },
        handleTouchStart(index, event) { this.currentTouchIndex = index; this.touchStartY = event.touches[0].clientY; },
        handleTouchMove(index, event) {
            if (this.currentTouchIndex === null) return;
            const currentY = event.touches[0].clientY;
            const diffY = currentY - this.touchStartY;
            if (Math.abs(diffY) > 35) {
                const targetIndex = diffY > 0 ? index + 1 : index - 1;
                if (targetIndex >= 0 && targetIndex < this.driverOrderedStops.length) {
                    this.swapRouteItems(index, targetIndex);
                    this.currentTouchIndex = targetIndex;
                    this.touchStartY = currentY;
                }
            }
        },
        handleTouchEnd() { this.currentTouchIndex = null; },
        swapRouteItems(fromIndex, toIndex) {
            let targetArray = [...this.driverOrderedStops];
            const movedItem = targetArray.splice(fromIndex, 1)[0];
            targetArray.splice(toIndex, 0, movedItem);
            this.driverOrderedStops = targetArray;
        },

        // 👑 관리자 마스터 노선 드래그앤드롭 조작 (핸들 전용 제어)
        handleAdminDragStart(index, event) { this.draggedAdminIndex = index; event.dataTransfer.effectAllowed = 'move'; },
        handleAdminDragOver(index, event) { event.preventDefault(); if (this.draggedAdminIndex === null || this.draggedAdminIndex === index) return; this.swapAdminStops(this.draggedAdminIndex, index); this.draggedAdminIndex = index; },
        handleAdminDragEnd() { this.draggedAdminIndex = null; this.syncMasterStopsToFirebase(); },
        handleAdminTouchStart(index, event) { this.currentTouchAdminIndex = index; this.touchAdminStartY = event.touches[0].clientY; },
        handleAdminTouchMove(index, event) {
            if (this.currentTouchAdminIndex === null) return;
            const currentY = event.touches[0].clientY;
            const diffY = currentY - this.touchAdminStartY;
            if (Math.abs(diffY) > 35) {
                const targetIndex = diffY > 0 ? index + 1 : index - 1;
                if (targetIndex >= 0 && targetIndex < this.masterStops.length) {
                    this.swapAdminStops(index, targetIndex);
                    this.currentTouchAdminIndex = targetIndex;
                    this.touchAdminStartY = currentY;
                }
            }
        },
        handleAdminTouchEnd() { this.currentTouchAdminIndex = null; this.syncMasterStopsToFirebase(); },
        swapAdminStops(fromIndex, toIndex) {
            let targetArray = [...this.masterStops];
            const movedItem = targetArray.splice(fromIndex, 1)[0];
            targetArray.splice(toIndex, 0, movedItem);
            this.masterStops = targetArray;
        },

        syncMembersToFirebase() {
            const uploadObj = {};
            this.allowedMembers.forEach(m => {
                uploadObj[m.id] = { id: String(m.id), name: String(m.name).trim(), phoneTail: String(m.phoneTail).trim() };
            });
            db.ref('allowedMembers').set(uploadObj);
        },
        syncMasterStopsToFirebase() {
            const uploadObj = {};
            this.masterStops.forEach((s, idx) => { uploadObj[s.id] = { id: String(s.id), name: String(s.name).trim(), sortOrder: idx }; });
            db.ref('masterStops').set(uploadObj);
        },
        syncTripsToFirebase() {
            const dataToSave = {};
            this.trips.forEach(trip => { dataToSave[trip.id] = trip; });
            db.ref('trips').set(dataToSave);
        },
        updateSystemNotice() { db.ref('systemNotice').set(this.notice); alert('📢 공지사항이 업데이트되었습니다.'); },
        updateSessionTimeout() {
            const targetVal = parseInt(this.sessionTimeoutMins);
            if (isNaN(targetVal) || targetVal <= 0) return alert('정확한 분 단위를 입력해 주세요.');
            db.ref('sessionTimeoutMins').set(targetVal);
            alert(`⏱️ 세션 유지 시간이 [${targetVal}분]으로 저장되었습니다.`);
        },
        getDayOfWeek(dateString) {
            const week = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const dayIndex = new Date(dateString).getDay();
            return isNaN(dayIndex) ? '' : week[dayIndex];
        },
        get activeTrips() {
            const todayStr = new Date().toISOString().split('T')[0];
            return this.trips.filter(trip => trip.date >= todayStr);
        },
        get myDrivenTrips() {
            if (!this.currentUser) return [];
            return this.trips.filter(trip => trip.driverName === this.currentUser.name);
        },

        tryUserLogin() {
            if (!this.loginName.trim() || !this.loginPhoneTail.trim()) return alert('이름과 비밀번호(뒷자리)를 입력해 주세요.');
            const targetName = String(this.loginName).replace(/\s/g, '');
            const targetTail = String(this.loginPhoneTail).replace(/\s/g, '');
            const member = this.allowedMembers.find(m => String(m.name).replace(/\s/g, '') === targetName && String(m.phoneTail).replace(/\s/g, '') === targetTail);
            if (member) {
                this.currentUser = member;
                this.isAdminAuthenticated = false;
                this.isUserLoggedIn = true;
                this.step = 'passenger';
                this.saveSessionToStorage(member, false);
                alert(`🔓 인증 성공! [${member.name}]님 반갑습니다.`);
            } else {
                alert('❌ 인증에 실패했습니다.\n이름 및 비밀번호가 틀렸거나 미승인 상태입니다. 비밀번호를 잊으셨다면 최고 관리자에게 비밀번호 리셋을 요청하세요.');
            }
        },

        // ⚙️ 사용자가 자신의 비밀번호 직접 변경 기능
        changeMyPassword() {
            if(!this.newInAppPw.trim() || this.newInAppPw.trim().length !== 4) return alert('변경할 비밀번호 뒷자리 4자리를 정확히 입력해 주세요.');
            const targetId = this.currentUser.id;
            db.ref(`allowedMembers/${targetId}/phoneTail`).set(this.newInAppPw.trim())
            .then(() => {
                alert('🔑 비밀번호가 성공적으로 변경되었습니다! 다음 로그인부터 적용됩니다.');
                this.currentUser.phoneTail = this.newInAppPw.trim();
                this.saveSessionToStorage(this.currentUser, this.isAdminAuthenticated);
                this.showInAppPwChange = false;
                this.newInAppPw = '';
            });
        },

        // 👑 관리자가 사용자의 비밀번호 강제 리셋 기능 (0000으로 강제 초기화)
        resetUserPassword(member) {
            if(!confirm(`🚨 [${member.name}] 회원의 비밀번호를 초기값 '0000'으로 강제 리셋하시겠습니까?`)) return;
            db.ref(`allowedMembers/${member.id}/phoneTail`).set('0000')
            .then(() => { alert(`⚙️ [${member.name}] 회원의 비밀번호가 '0000'으로 초기화되었습니다.`); });
        },

        tryAdminAccess() {
            if (this.adminIdInput.trim() === this.currentAdminId && this.adminPasswordInput === this.currentAdminPassword) {
                this.isAdminAuthenticated = true;
                this.currentUser = { id: 'admin_master', name: '👑 관리자', phoneTail: '0000' };
                this.isUserLoggedIn = true;
                this.step = 'admin';
                this.showPasswordModal = false;
                this.newAdminId = this.currentAdminId;
                this.newAdminPassword = this.currentAdminPassword;
                this.adminIdInput = ''; this.adminPasswordInput = '';
                this.saveSessionToStorage(this.currentUser, true);
                alert('👑 관리자 전용 제어 화면으로 진입했습니다.');
            } else {
                alert('❌ 관리자 계정 정보가 일치하지 않습니다.');
            }
        },

        userLogout() {
            this.isUserLoggedIn = false;
            this.isAdminAuthenticated = false;
            this.currentUser = null;
            this.loginName = ''; this.loginPhoneTail = '';
            this.lastReservedData = null; this.lastDriverActionData = null;
            this.inputDriverPhone = '010-'; this.inputPassengerPhone = '010-';
            this.step = 'passenger';
            this.isEditingMode = false; this.editingTripId = null;
            localStorage.removeItem('carpool_session');
        },

        updateAdminAccount() {
            if (!this.newAdminId.trim() || !this.newAdminPassword.trim()) return alert('변경할 아이디와 비밀번호를 채워주세요.');
            db.ref('adminAccount').set({ id: this.newAdminId.trim(), password: this.newAdminPassword.trim() });
            alert(`⚙ = 관리자 계정 정보가 변경되었습니다.`);
        },

        addAllowedMember() {
            if (!this.newMemberName.trim() || !this.newMemberPhone.trim()) return alert('이름과 초기 비밀번호 4자리를 기입해 주세요.');
            const memberName = this.newMemberName.trim();
            const memberPhone = this.newMemberPhone.trim();
            if (this.allowedMembers.some(m => String(m.name).trim() === memberName && String(m.phoneTail).trim() === memberPhone)) {
                return alert('⚠️ 이미 등록된 동일한 회원 정보가 존재합니다.');
            }
            this.allowedMembers.push({ id: 'm_' + Date.now(), name: memberName, phoneTail: memberPhone });
            this.syncMembersToFirebase();
            alert(`👥 [${memberName}]님이 회원 명단에 정상 등록되었습니다.`);
            this.newMemberName = ''; this.newMemberPhone = '';
        },

        removeMember(memberId, name) {
            if (!confirm(`🚨 [${name}] 회원을 완전히 삭제하시겠습니까?`)) return;
            this.allowedMembers = this.allowedMembers.filter(m => m.id !== memberId);
            this.syncMembersToFirebase();
            if (this.currentUser && this.currentUser.name === name) this.userLogout();
        },

        addMasterStop() {
            if (!this.newStopName.trim()) return alert('정류소 이름을 기입하세요.');
            const stopName = this.newStopName.trim();
            if (this.masterStops.some(s => s.name === stopName)) return alert('⚠️ 이미 존재하는 정류소 이름입니다.');
            this.masterStops.push({ id: 'stop_' + Date.now(), name: stopName, sortOrder: this.masterStops.length });
            this.syncMasterStopsToFirebase();
            alert(`📍 [${stopName}] 정류소가 마스터 노선 목록 최하단에 추가되었습니다.`);
            this.newStopName = '';
        },

        removeMasterStop(stopId, name) {
            if (!confirm(`🚨 [${name}] 정류소를 시스템 마스터 목록에서 완전히 지우시겠습니까?`)) return;
            this.masterStops = this.masterStops.filter(s => s.id !== stopId);
            this.selectedStopIds = this.selectedStopIds.filter(id => id !== stopId);
            this.rebuildDriverRoute();
            this.syncMasterStopsToFirebase();
        },

        // 🚗 카풀 일정 등록 및 수정 통합 함수
        registerTrip() {
            let finalDriverName = this.currentUser.name;
            if (!this.inputDate) return alert('운행 날짜를 골라주세요.');
            let phoneValue = this.inputDriverPhone.trim();
            if (!phoneValue || phoneValue === '010-') return alert('연락처를 입력해 주세요.');
            if (this.driverOrderedStops.length === 0) return alert('최소 하나의 경유 노선을 지정하세요.');
            
            const todayStr = new Date().toISOString().split('T')[0];
            if (this.inputDate < todayStr) return alert('⚠️ 이미 지나간 과거 날짜는 등록/지정이 불가합니다.');

            if (this.isEditingMode && this.editingTripId) {
                // 수정 처리 로직
                const targetTrip = this.trips.find(t => t.id === this.editingTripId);
                if (targetTrip) {
                    let approvedSeats = (targetTrip.passengers || []).filter(p => p.status === 'approved').reduce((sum, p) => sum + p.count, 0);
                    let newTotal = parseInt(this.inputSeats);
                    if (newTotal < approvedSeats) return alert(`❌ 수락 완료된 동승자(${approvedSeats}명)보다 작게 모집 좌석을 세팅할 수 없습니다.`);
                    
                    targetTrip.date = this.inputDate;
                    targetTrip.dayOfWeek = this.getDayOfWeek(this.inputDate);
                    targetTrip.departureTime = this.inputTime;
                    targetTrip.totalSeats = newTotal;
                    targetTrip.remainingSeats = newTotal - approvedSeats;
                    targetTrip.direction = this.inputDirection;
                    targetTrip.driverPhone = phoneValue;
                    targetTrip.route = JSON.parse(JSON.stringify(this.driverOrderedStops));
                    
                    this.syncTripsToFirebase();
                    alert('✨ 카풀 운행 설정이 성공적으로 변경되었습니다.');
                    this.cancelFormEdit();
                }
            } else {
                // 신규 등록 로직
                const newTrip = {
                    id: 'trip_' + Date.now(),
                    createdAt: Date.now(),
                    driverName: finalDriverName,
                    driverPhone: phoneValue,
                    date: this.inputDate,
                    dayOfWeek: this.getDayOfWeek(this.inputDate),
                    departureTime: this.inputTime,
                    totalSeats: parseInt(this.inputSeats),
                    remainingSeats: parseInt(this.inputSeats),
                    direction: this.inputDirection,
                    route: JSON.parse(JSON.stringify(this.driverOrderedStops)),
                    passengers: []
                };
                this.trips.unshift(newTrip);
                this.syncTripsToFirebase();
                alert(`🚗 [${this.inputDirection}] 카풀 일정이 정식 등록되었습니다.`);
                this.clearTripForm();
            }
        },

        // 수정 폼 진입 빌더
        openTripEdit(trip) {
            this.isEditingMode = true;
            this.editingTripId = trip.id;
            this.inputDate = trip.date;
            this.inputTime = trip.departureTime;
            this.inputSeats = trip.totalSeats;
            this.inputDirection = trip.direction || '가는편';
            this.inputDriverPhone = trip.driverPhone || '010-';
            this.driverOrderedStops = JSON.parse(JSON.stringify(trip.route || []));
            this.selectedStopIds = this.driverOrderedStops.map(s => s.id);
            window.scrollTo({top: 0, behavior: 'smooth'});
        },

        cancelFormEdit() { this.isEditingMode = false; this.editingTripId = null; this.clearTripForm(); },
        clearTripForm() { this.selectedStopIds = []; this.driverOrderedStops = []; this.inputSeats = 1; this.inputDirection = '가는편'; },

        // 동승자 수락 상태 여부 체크
        hasApprovedPassengers(trip) {
            return (trip.passengers || []).some(p => p.status === 'approved');
        },

        selectTrip(trip) {
            this.selectedTrip = trip;
            this.passengerPickup = '';
            this.passengerCount = 1;
            this.inputPassengerPhone = '010-';
        },

        confirmReservation() {
            if (!this.passengerPickup) return alert('탑승할 픽업 장소를 선택해 주세요.');
            let pPhone = this.inputPassengerPhone.trim();
            if (!pPhone || pPhone === '010-') return alert('연락처를 입력해 주세요.');
            if (this.selectedTrip.remainingSeats < this.passengerCount) return alert('현재 남아있는 카풀 잔여석이 부족합니다.');
            if (!this.selectedTrip.passengers) this.selectedTrip.passengers = [];

            const newPassenger = {
                id: 'ps_' + Date.now(),
                name: this.currentUser.name,
                phone: pPhone,
                count: parseInt(this.passengerCount),
                pickup: this.passengerPickup,
                status: 'pending'
            };
            this.selectedTrip.passengers.push(newPassenger);
            this.syncTripsToFirebase();

            this.lastReservedData = {
                driverName: this.selectedTrip.driverName,
                driverPhone: this.selectedTrip.driverPhone,
                date: this.selectedTrip.date,
                time: this.selectedTrip.departureTime,
                passengerName: newPassenger.name,
                count: newPassenger.count,
                pickup: newPassenger.pickup,
                direction: this.selectedTrip.direction || '가는편'
            };
            alert('🎉 탑승 예약 신청이 접수되었습니다. 운전자 문자/카톡 안내를 활용해 소통하세요!');
        },

        acceptPassenger(trip, passenger) {
            if (trip.remainingSeats < passenger.count) return alert('❌ 차량 잔여 좌석이 부족하여 승인이 불가합니다.');
            passenger.status = 'approved';
            trip.remainingSeats -= passenger.count;
            this.syncTripsToFirebase();

            this.lastDriverActionData = {
                type: '수락',
                passengerName: passenger.name,
                passengerPhone: passenger.phone,
                date: trip.date,
                time: trip.departureTime,
                pickup: passenger.pickup,
                count: passenger.count,
                driverName: trip.driverName,
                direction: trip.direction || '가는편'
            };
        },

        rejectPassenger(trip, passenger) {
            if (passenger.status === 'approved') trip.remainingSeats += passenger.count;
            passenger.status = 'rejected';
            this.syncTripsToFirebase();

            this.lastDriverActionData = {
                type: '거절',
                passengerName: passenger.name,
                passengerPhone: passenger.phone,
                date: trip.date,
                time: trip.departureTime,
                pickup: passenger.pickup,
                count: passenger.count,
                driverName: trip.driverName,
                direction: trip.direction || '가는편'
            };
        },

        sendDriverSms() {
            if (!this.lastDriverActionData) return;
            const d = this.lastDriverActionData;
            const message = `[창원경화카풀] 매칭결과\n▶${d.passengerName}님 신청 건\n▶구분: ${d.direction}\n▶일시: ${d.date} (${d.time})\n▶결과: 카풀 매칭이 [${d.type}] 되었습니다.\n- 운전자: ${d.driverName}`;
            window.location.href = `sms:${d.passengerPhone}?body=${encodeURIComponent(message)}`;
        },
        copyDriverKakaoText() {
            if (!this.lastDriverActionData) return;
            const d = this.lastDriverActionData;
            const message = `[창원경화카풀 알림]\n• ${d.passengerName}님 카풀(${d.direction}) 신청이 [${d.type}] 되었습니다.\n• 일시: ${d.date} [${d.time}]\n• 탑승지: ${d.pickup} (${d.count}명)\n\n단체 대화방 혹은 현장에서 만나요.`;
            navigator.clipboard.writeText(message).then(() => alert('📋 카카오톡 전송 문구가 복사되었습니다!'));
        },
        sendSmsNotification() {
            if (!this.lastReservedData) return;
            const d = this.lastReservedData;
            const message = `[창원경화카풀] 탑승요청\n▶운전자: ${d.driverName}님\n▶운행구분: ${d.direction}\n▶일시: ${d.date} (${d.time})\n▶신청자: ${d.passengerName} (${d.count}명)\n▶탑승지: ${d.pickup}\n\n시스템 확인 수락 부탁드립니다!`;
            window.location.href = `sms:${d.driverPhone}?body=${encodeURIComponent(message)}`;
        },
        copyKakaoText() {
            if (!this.lastReservedData) return;
            const d = this.lastReservedData;
            const message = `[창원경화카풀 탑승요청]\n• 운전자: ${d.driverName}님\n• 노선구분: ${d.direction}\n• 일시: ${d.date} [${d.time}]\n• 동승자: ${d.passengerName} (${d.count}명)\n• 픽업요청지: ${d.pickup}\n\n확인 후 수락 처리 부탁드립니다!`;
            navigator.clipboard.writeText(message).then(() => alert('📋 요청 텍스트가 클립보드에 복사되었습니다!'));
        },

        cancelPassengerBooking(trip, passenger, isAdminAction = false) {
            if (!confirm(isAdminAction ? `🚨 [관리자 조치] 해당 예약을 취소하시겠습니까?` : '카풀 신청 예약을 취소할까요?')) return;
            if (passenger.status === 'approved') trip.remainingSeats += passenger.count;
            trip.passengers = (trip.passengers || []).filter(p => p.id !== passenger.id);
            if (this.selectedTrip && this.selectedTrip.id === trip.id) this.selectedTrip = null;
            this.lastReservedData = null;
            this.syncTripsToFirebase();
        },
        driverResetAction() { this.lastDriverActionData = null; },
        cancelDriverTrip(trip, isAdminAction = false) {
            if (!confirm(isAdminAction ? `🚨 [관리자 조치] 카풀 일정을 강제 취소합니까?` : '등록하신 카풀 운행 일정을 취소하시겠습니까?')) return;
            this.trips = this.trips.filter(t => t.id !== trip.id);
            this.selectedTrip = null; this.lastReservedData = null; this.lastDriverActionData = null;
            this.syncTripsToFirebase();
        }
    }" x-init="initSystem()" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col h-[880px] relative">

                                            <input type="radio" value="가는편" x-model="inputDirection" class="sr-only"> ☀️ 출근/가는 편
                                        </label>
                                        <label class="flex items-center justify-center gap-2 p-2 rounded-lg border cursor-pointer font-bold" :class="inputDirection === '오는편' ? 'bg-blue-50 border-blue-600 text-blue-800' : 'bg-white border-gray-200'">
                                            <input type="radio" value="오는편" x-model="inputDirection" class="sr-only"> 🌙 퇴근/오는 편
                                        </label>
                                    </div>
                                </div>

                                <div class="bg-blue-50 p-2.5 rounded-lg border border-blue-100">
                                    <label class="block font-black text-blue-900 mb-1">📞 운전자 핫라인 비상 연락처</label>
                                    <input type="tel" x-model="inputDriverPhone" class="w-full p-2 border border-blue-200 rounded-lg bg-white font-bold text-gray-800 focus:outline-none">
                                </div>

                                <div>
                                    <label class="block font-bold text-gray-500 mb-1">📅 운행 일자 지정 (당일/미래만 허용)</label>
                                    <input type="date" x-model="inputDate" :disabled="isEditingMode && hasApprovedPassengers(tri.find(t=>t.id===editingTripId))" class="w-full p-2 border border-gray-200 rounded-lg bg-white font-bold disabled:bg-gray-200 disabled:text-gray-400">
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="block font-bold text-gray-500 mb-1">⏰ 출발 예정 시각</label>
                                        <input type="time" x-model="inputTime" :disabled="isEditingMode && hasApprovedPassengers(trips.find(t=>t.id===editingTripId))" class="w-full p-2 border border-gray-200 rounded-lg bg-white disabled:bg-gray-200">
                                    </div>
                                    <div>
                                        <label class="block font-bold text-gray-500 mb-1">👥 모집 타깃 좌석수</label>
                                        <select x-model="inputSeats" class="w-full p-2 border border-gray-200 rounded-lg bg-white font-bold">
                                            <option value="1">1석</option><option value="2">2석</option><option value="3">3석</option><option value="4">4석</option><option value="5">5석</option><option value="6">6석</option>
                                        </select>
                                    </div>
                                </div>
                                <template x-if="isEditingMode && hasApprovedPassengers(trips.find(t=>t.id===editingTripId))">
                                    <p class="text-[10px] text-amber-600 font-extrabold">※ 이미 승인 처리된 예약 동승자가 존재하여 날짜 및 시간 변경은 불가하며, 좌석수 추가 확장 조정만 가능합니다.</p>
                                </template>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-700 block">☑️ 운행 주행 경로상 경유 노선 선택</label>
                                <div class="grid grid-cols-1 gap-1 max-h-32 overflow-y-auto bg-gray-50 p-2 rounded-xl border border-gray-100">
                                    <template x-for="stop in masterStops" :key="stop.id">
                                        <label class="flex items-center gap-2 p-2 bg-white rounded-lg border border-gray-200 cursor-pointer text-xs select-none">
                                            <input type="checkbox" :value="stop.id" x-model="selectedStopIds" @change="rebuildDriverRoute()" class="w-4 h-4 text-blue-600 rounded">
                                            <span class="font-bold text-gray-700 truncate" x-text="stop.name"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-700 block">🔄 배차 주행 순서 정렬 <span class="text-[10px] text-blue-600 font-extrabold ml-1">(핸들 영역 ☰ 밀어서 무빙)</span></label>
                                <div class="space-y-1 max-h-36 overflow-y-auto bg-gray-50 p-2 rounded-xl border border-gray-200 border-dashed">
                                    <template x-if="driverOrderedStops.length === 0">
                                        <div class="text-center py-4 text-[11px] text-gray-400">우측 정류소를 체크하면 고유 노선 리스트가 빌드업됩니다.</div>
                                    </template>
                                    <template x-for="(stop, index) in driverOrderedStops" :key="stop.id">
                                        <div class="flex items-center gap-2 p-2 bg-white border border-gray-200 rounded-lg text-xs">
                                            <div class="flex items-center gap-1 bg-blue-50 text-blue-600 font-black px-2 py-1 rounded select-none cursor-row-resize touch-none"
                                                 draggable="true" 
                                                 @dragstart="handleDragStart(index, $event)" 
                                                 @dragover="handleDragOver(index, $event)" 
                                                 @dragend="handleDragEnd()" 
                                                 @touchstart="handleTouchStart(index, $event)" 
                                                 @touchmove="handleTouchMove(index, $event)" 
                                                 @touchend="handleTouchEnd()">
                                                <span>☰</span> <span x-text="index + 1"></span>
                                            </div>
                                            <span class="font-bold text-gray-800 truncate flex-1" x-text="stop.name"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <button @click="registerTrip()" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-xl text-xs shadow-md cursor-pointer" x-text="isEditingMode ? '💾 수정사항 데이터 시스템에 동기화 저장' : '🚗 카풀 운행 노선 신규 등록 등록'"></button>
                            
                            <hr class="border-gray-100">

                            <div class="space-y-2">
                                <h3 class="text-xs font-black text-gray-800">📥 내 실시간 운행 관리 및 매칭 제어 센터</h3>
                                <div class="space-y-2.5 max-h-64 overflow-y-auto">
                                    <template x-if="myDrivenTrips.length === 0">
                                        <div class="text-center py-6 text-[11px] text-gray-400 bg-gray-50 rounded-xl border">배차 등록 내역이 존재하지 않습니다.</div>
                                    </template>
                                    <template x-for="trip in myDrivenTrips" :key="trip.id">
                                        <div class="p-3 bg-blue-50/60 border border-blue-200 rounded-xl space-y-2 text-xs">
                                            <div class="flex justify-between items-center pb-2 border-b border-dashed border-blue-200">
                                                <span class="font-black text-blue-900" x-text="`📅 [${trip.direction || '가는편'}] ${trip.date} (${trip.departureTime})`"></span>
                                                <div class="flex gap-1">
                                                    <button @click="openTripEdit(trip)" class="bg-amber-500 text-white px-2 py-0.5 rounded text-[10px] font-bold">수정</button>
                                                    <button @click="cancelDriverTrip(trip)" class="bg-red-600 text-white px-2 py-0.5 rounded text-[10px] font-bold">파기</button>
                                                </div>
                                            </div>
                                            <div class="space-y-1.5">
                                                <template x-if="!trip.passengers || trip.passengers.length === 0">
                                                    <p class="text-[10px] text-gray-400 py-1 text-center font-bold">아직 접수된 매칭 요청이 없습니다.</p>
                                                </template>
                                                <template x-for="p in trip.passengers || []" :key="p.id">
                                                    <div class="bg-white p-2 rounded-lg border border-gray-200 flex flex-col gap-1 shadow-xs">
                                                        <div class="flex justify-between items-center">
                                                            <span class="font-black text-gray-800" x-text="`🙋‍♀️ ${p.name} (${p.count}명)`"></span>
                                                            <span class="text-[9px] font-bold px-1.5 py-0.2 rounded" :class="p.status === 'pending' ? 'bg-amber-100 text-amber-800' : p.status === 'approved' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'" x-text="p.status === 'pending' ? '대기 중' : p.status === 'approved' ? '수락됨' : '거절됨'"></span>
                                                        </div>
                                                        <div class="text-[10px] text-gray-500" x-text="`📍 요청지: ${p.pickup}`"></div>
                                                        <div class="flex gap-1 pt-1">
                                                            <button @click="rejectPassenger(trip, p)" class="flex-1 bg-gray-100 text-gray-700 border py-1 rounded-md text-[10px] font-bold cursor-pointer">거절</button>
                                                            <button @click="acceptPassenger(trip, p)" class="flex-1 bg-blue-600 text-white py-1 rounded-md text-[10px] font-bold cursor-pointer">수락</button>
                                                        </div>
                                                        <template x-if="lastDriverActionData && lastDriverActionData.passengerName === p.name">
                                                            <div class="bg-slate-900 text-white p-2 rounded-md space-y-1 mt-1">
                                                                <div class="grid grid-cols-2 gap-1.5 text-center">
                                                                    <button @click="sendDriverSms()" class="bg-blue-600 text-white text-[10px] font-black py-1 rounded cursor-pointer">💬 결과 문자 발송</button>
                                                                    <button @click="copyDriverKakaoText()" class="bg-yellow-500 text-gray-950 text-[10px] font-black py-1 rounded cursor-pointer">💛 카톡내용 복사</button>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="step === 'passenger' && !selectedTrip">
                        <div class="space-y-4">
                            <div class="bg-white p-3 rounded-2xl border border-gray-200 shadow-xs">
                                <button @click="showInAppPwChange = !showInAppPwChange" class="w-full flex justify-between items-center text-xs font-black text-gray-700 focus:outline-none">
                                    <span>🔑 내 매칭 비밀번호 직접 변경하기</span>
                                    <span x-text="showInAppPwChange ? '▲' : '▼'"></span>
                                </button>
                                <div x-show="showInAppPwChange" x-transition class="pt-3 space-y-2">
                                    <div class="flex gap-2">
                                        <input type="password" maxlength="4" x-model="newInAppPw" placeholder="새 비밀번호 뒷자리 4자리" class="flex-1 p-2 text-center text-xs border border-gray-200 rounded-xl font-bold bg-gray-50 focus:bg-white focus:outline-none">
                                        <button @click="changeMyPassword()" class="bg-gray-900 text-white text-xs font-bold px-3 py-2 rounded-xl">변경 확정</button>
                                    </div>
                                    <p class="text-[10px] text-gray-400 font-semibold leading-tight">※ 변경 완료 직후 다음 로그인 및 본인 인증 검증 시 변경된 4자리 정보가 연동 반영됩니다.</p>
                                </div>
                            </div>

                            <h2 class="text-base font-black text-gray-900">🚗 실시간 매칭 지원 카풀 운행 라인업</h2>
                            
                            <template x-if="lastReservedData">
                                <div class="bg-emerald-950 text-white p-4 rounded-2xl border-2 border-emerald-400 space-y-3 shadow-lg">
                                    <div class="flex justify-between items-center text-xs text-emerald-300 font-bold">
                                        <span>📱 운전자 수락 독촉 전송 수단 선별</span>
                                        <button @click="lastReservedData = null" class="text-gray-400 font-black">✕</button>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button @click="sendSmsNotification()" class="bg-emerald-600 text-white text-xs font-black py-2 rounded-xl cursor-pointer">💬 매칭요청 문자쏘기</button>
                                        <button @click="copyKakaoText()" class="bg-yellow-500 text-gray-950 text-xs font-black py-2 rounded-xl cursor-pointer">💛 카톡 템플릿 복사</button>
                                    </div>
                                </div>
                            </template>

                            <div class="space-y-2">
                                <template x-if="activeTrips.length === 0">
                                    <div class="text-center py-12 bg-gray-50 border border-dashed rounded-2xl text-gray-400 text-xs">현재 모집 활성화된 매칭 카풀이 존재하지 않습니다.</div>
                                </template>
                                <template x-for="trip in activeTrips" :key="trip.id">
                                    <div class="p-4 bg-white border border-gray-200 rounded-xl space-y-2.5 shadow-xs">
                                        <div class="flex justify-between items-start text-xs">
                                            <div>
                                                <div class="flex gap-1.5 items-center">
                                                    <span class="bg-emerald-50 text-emerald-700 font-black px-2 py-0.5 rounded text-[10px]" x-text="`${trip.date} (${trip.dayOfWeek})`"></span>
                                                    <span class="font-black px-1.5 py-0.5 rounded text-[10px]" :class="trip.direction === '오는편' ? 'bg-purple-100 text-purple-800':'bg-amber-100 text-amber-800'" x-text="trip.direction || '가는편'"></span>
                                                </div>
                                                <h3 class="font-extrabold text-gray-800 mt-1" x-text="`운전자: ${trip.driverName}`"></h3>
                                            </div>
                                            <span class="font-black text-blue-600 bg-blue-50 px-2 py-1 rounded text-[11px]" x-text="`${trip.departureTime} 배차`"></span>
                                        </div>
                                        
                                        <div class="flex flex-wrap items-center gap-1 text-[10px] text-gray-500 bg-gray-50 p-2 rounded-lg border border-gray-100">
                                            <template x-for="(st, idx) in trip.route" :key="st.id">
                                                <div class="flex items-center gap-0.5">
                                                    <span class="font-bold text-gray-700 bg-white px-1.5 py-0.5 rounded border border-gray-100" x-text="st.name"></span>
                                                    <span x-show="idx < trip.route.length - 1" class="text-gray-300 font-bold">→</span>
                                                </div>
                                            </template>
                                        </div>

                                        <div class="pt-1 space-y-1">
                                            <template x-for="p in (trip.passengers || []).filter(ps => ps.name === currentUser.name)" :key="p.id">
                                                <div class="flex justify-between items-center p-2 rounded text-[11px] font-bold" :class="p.status === 'approved' ? 'bg-emerald-50 text-emerald-800' : p.status === 'rejected' ? 'bg-red-50 text-red-600' : 'bg-amber-50 text-amber-800'">
                                                    <span x-text="p.status === 'pending' ? '⏳ 예약 요청 접수완료: 대기 상태' : p.status === 'approved' ? '✅ 매칭최종 성사! 수락 완료🎉' : '❌ 매칭 불가 반송됨'"></span>
                                                    <button @click="cancelPassengerBooking(trip, p)" class="bg-gray-800 text-white font-normal text-[9px] px-2 py-0.5 rounded cursor-pointer">철회</button>
                                                </div>
                                            </template>
                                            
                                            <div class="flex justify-between items-center mt-1">
                                                <span class="text-[11px] text-gray-500 font-bold" x-text="`잔여 공석: ${trip.remainingSeats}석 / 총 모집정원: ${trip.totalSeats}석`"></span>
                                                <template x-if="trip.remainingSeats <= 0">
                                                    <span class="bg-red-600 text-white font-black px-4 py-1.5 rounded-lg text-xs shadow-sm">매칭 만석 ❌</span>
                                                </template>
                                                <template x-if="trip.remainingSeats > 0">
                                                    <button @click="selectTrip(trip)" class="bg-emerald-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs cursor-pointer">탑승 신청 절차</button>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-if="step === 'passenger' && selectedTrip">
                        <div class="space-y-4">
                            <button @click="selectedTrip = null;" class="text-gray-400 text-xs bg-gray-100 px-2 py-1 rounded-md cursor-pointer">← 이전 라인업 리스트로 회귀</button>
                            <div class="p-3 bg-emerald-50 rounded-xl text-xs font-bold text-emerald-900" x-text="`[${selectedTrip.direction || '가는편'}] ${selectedTrip.date} (${selectedTrip.departureTime}) | 운전자 명의: ${selectedTrip.driverName}`"></div>
                            
                            <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-200 space-y-1">
                                <label class="block text-xs font-black text-emerald-900">📞 탑승자용 실시간 비상 폰번호 입력</label>
                                <input type="tel" x-model="inputPassengerPhone" class="w-full p-2 text-xs border border-emerald-300 rounded-lg bg-white font-bold text-gray-800 focus:outline-none">
                            </div>

                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 flex justify-between items-center text-xs">
                                <label class="font-bold text-gray-700">👥 최종 탑승 희망 동반인원수</label>
                                <select x-model="passengerCount" class="bg-white border p-1 rounded-lg font-bold">
                                    <option value="1">본인 1명</option><option value="2">2명</option><option value="3">3명</option>
                                </select>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-gray-700 block">👋 본인 고유 픽업 타는 곳 정류소 확정</label>
                                <div class="space-y-1 max-h-48 overflow-y-auto">
                                    <template x-for="stop in selectedTrip.route" :key="stop.id">
                                        <label :class="passengerPickup === stop.name ? 'border-emerald-600 bg-emerald-50' : 'border-gray-200'" class="flex items-center gap-2.5 p-2.5 border rounded-xl cursor-pointer text-xs bg-white">
                                            <input type="radio" name="p_pickup_v30" :value="stop.name" x-model="passengerPickup" class="w-3.5 h-3.5 text-emerald-600">
                                            <span class="font-extrabold text-gray-800" x-text="stop.name"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>
                            <button @click="confirmReservation(); selectedTrip = null;" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-xs shadow-md cursor-pointer">⚡ 탑승 매칭 최종 요청 완료</button>
                        </div>
                    </template>

                </div>
            </div>
        </template>

        <div x-show="showPasswordModal" class="absolute inset-0 bg-black/60 flex justify-center items-center p-6 z-50" x-transition>
            <div class="bg-white rounded-2xl p-5 w-full max-w-xs space-y-3 shadow-2xl">
                <h3 class="text-xs font-black text-gray-900 text-center">🔒 최고 권한 관리자 인증 관문</h3>
                <div class="space-y-2">
                    <input type="text" x-model="adminIdInput" placeholder="관리자 고유 식별ID" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:outline-none">
                    <input type="password" x-model="adminPasswordInput" @keydown.enter="tryAdminAccess()" placeholder="보안 인증 패스워드" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:outline-none">
                </div>
                <div class="flex gap-2">
                    <button @click="showPasswordModal = false;" class="flex-1 bg-gray-200 text-gray-600 font-bold py-1.5 rounded-lg text-xs cursor-pointer">취소</button>
                    <button @click="tryAdminAccess()" class="flex-1 bg-red-600 text-white font-bold py-1.5 rounded-lg text-xs cursor-pointer">검증 진입</button>
                </div>
            </div>
        </div>

        <div class="p-2.5 bg-gray-50 border-t border-gray-100 text-center text-[10px] text-gray-400 font-semibold shrink-0">
            창원경화카풀 세션 및 매칭 고도화 모델 v30 © 2026
        </div>
    </div>

</body>
</html>
