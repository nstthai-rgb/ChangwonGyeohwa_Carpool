<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창원경화카풀 실시간 동기화 시스템 v25</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- 🌐 Firebase 핵심 SDK 및 Realtime Database 라이브러리 탑재 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script>
    // 🛠️ 본인의 Firebase 프로젝트 정보로 이 부분을 반드시 수정해 주세요!
   const firebaseConfig = {
  apiKey: "AIzaSyAr6TlLN5_SPZwfnGgyxQkR3zQrtPIbOKg",
  authDomain: "changwongyeonghwa-carpool.firebaseapp.com",
  databaseURL: "https://changwongyeonghwa-carpool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "changwongyeonghwa-carpool",
  storageBucket: "changwongyeonghwa-carpool.firebasestorage.app",
  messagingSenderId: "595964487926",
  appId: "1:595964487926:web:fff99d69b0b05bb04ee4d7",
  measurementId: "G-K6XS5LF6XV"
};
    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-4 selection:bg-emerald-200">

  <div x-data="{
    step: 'passenger', 
    notice: '📢 운전자와 동승자가 여러 차례 충분한 의사 소통을 하세요.',
    inputNotice: '',

    isUserLoggedIn: false, 
    loginName: '',
    loginPhoneTail: '',
    currentUser: null, 

    isAdminAuthenticated: false,
    adminIdInput: '',
    adminPasswordInput: '',
    
    currentAdminId: 'admin',
    currentAdminPassword: '1914', 
    
    newAdminId: '',
    newAdminPassword: '',
    showPasswordModal: false,

    // [👥 화이트리스트 회원 관리 DB]
    allowedMembers: [],
    newMemberName: '',
    newMemberPhone: '',

    masterStops: [
      { id: 'stop1', name: '중앙시장 (태백사거리 방면)', address: '519808 정류소' },
      { id: 'stop2', name: '중부시장입구 (경화성당 방면)', address: '5199818 정류소' },
      { id: 'stop3', name: '경화시장 (염전사거리 방면)', address: '519822 정류소' },
      { id: 'stop4', name: '경화동 (경화역 방면)', address: '518114 정류소' },
      { id: 'stop5', name: '경화역 (진해남중 방면)', address: '518116 정류소' },
      { id: 'stop6', name: '진해남중 (진해세화여고 방면)', address: '518118 정류소' },
      { id: 'stop7', name: '진해세화여고 (롯데마트 방면)', address: '518120 정류소' },
      { id: 'stop8', name: '삼정코아 (두산위브 방면)', address: '516406 정류소' }
    ],

    inputDate: '', 
    inputTime: '18:30',
    inputSeats: 1, 
    inputDriverPhone: '010-', 
    selectedStopIds: [], 
    driverOrderedStops: [],
    inputPassengerPhone: '010-',
    
    draggedIndex: null,
    touchStartY: 0,
    currentTouchIndex: null,

    // [🚗 실시간 카풀 스케줄 DB]
    trips: [],

    selectedTrip: null,
    passengerPickup: '',
    passengerCount: 1,
    
    lastReservedData: null, 
    lastDriverActionData: null, 

    // 시스템 초기 구동 및 Firebase 실시간 연동
    initSystem() {
      this.inputNotice = this.notice;
      
      const today = new Date();
      this.inputDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      // 1. 회원 명단 실시간 양방향 구독 (안전한 객체 백업 및 평탄화 배열 변환)
      db.ref('allowedMembers').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          // 객체로 들어오든 배열로 들어오든 순수 자바스크립트 배열로 강제 변환
          this.allowedMembers = Object.values(data).map(m => ({
            id: String(m.id),
            name: String(m.name).trim(),
            phoneTail: String(m.phoneTail).trim()
          }));
        } else {
          // 데이터가 완전 비어있을 때의 초기 세팅
          this.allowedMembers = [
            { id: 'm_1', name: '홍길동', phoneTail: '1234' },
            { id: 'm_2', name: '이순신', phoneTail: '5678' },
            { id: 'm_3', name: '김경화', phoneTail: '0000' }
          ];
          this.syncMembersToFirebase();
        }
      });

      // 2. 카풀 피드 실시간 구독 및 동기화
      db.ref('trips').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          let parsedTrips = Object.values(data);
          parsedTrips.sort((a, b) => b.createdAt - a.createdAt);
          this.trips = parsedTrips;

          if (this.selectedTrip) {
            const updated = this.trips.find(t => t.id === this.selectedTrip.id);
            if (updated) this.selectedTrip = updated;
          }
        } else {
          this.trips = [];
        }
      });
    },

    // 경유지 체크박스 변경 시 즉각 호출되는 노선 빌더 함수
    rebuildDriverRoute() {
      // 마스터 정류소 중 선택된 ID에 포함되는 것만 필터링
      let currentStops = this.masterStops.filter(stop => this.selectedStopIds.includes(stop.id));
      let newOrdered = [];
      
      // 기존에 순서가 맞춰져 있던 정류소 정보 유지
      this.driverOrderedStops.forEach(os => {
        if (currentStops.some(cs => cs.id === os.id)) newOrdered.push(os);
      });
      
      // 새로 체크되어 추가된 정류소를 뒤에 순차적으로 결합
      currentStops.forEach(cs => {
        if (!newOrdered.some(no => no.id === cs.id)) newOrdered.push(cs);
      });
      
      this.driverOrderedStops = newOrdered;
    },

    // PC 마우스 드래그앤드롭 핸들러
    handleDragStart(index, event) {
      this.draggedIndex = index;
      event.dataTransfer.effectAllowed = 'move';
    },

    handleDragOver(index, event) {
      event.preventDefault();
      if (this.draggedIndex === null || this.draggedIndex === index) return;
      this.swapRouteItems(this.draggedIndex, index);
      this.draggedIndex = index;
    },

    handleDragEnd() {
      this.draggedIndex = null;
    },

    // 📱 모바일 전용 터치 스와이프 순서 변경 코어 엔진
    handleTouchStart(index, event) {
      this.currentTouchIndex = index;
      this.touchStartY = event.touches[0].clientY;
    },

    handleTouchMove(index, event) {
      if (this.currentTouchIndex === null) return;
      
      const currentY = event.touches[0].clientY;
      const diffY = currentY - this.touchStartY;
      
      if (Math.abs(diffY) > 35) {
        const targetIndex = diffY > 0 ? index + 1 : index - 1;
        
        if (targetIndex >= 0 && targetIndex < this.driverOrderedStops.length) {
          this.swapRouteItems(index, targetIndex);
          this.currentTouchIndex = targetIndex;
          this.touchStartY = currentY; 
        }
      }
    },

    handleTouchEnd() {
      this.currentTouchIndex = null;
    },

    swapRouteItems(fromIndex, toIndex) {
      let targetArray = [...this.driverOrderedStops];
      const movedItem = targetArray.splice(fromIndex, 1)[0];
      targetArray.splice(toIndex, 0, movedItem);
      this.driverOrderedStops = targetArray;
    },

    // ⚠️ [중요 수정한 곳] 명단 유실 방지를 위해 Key-Value 형태의 완전한 오브젝트 구조로 데이터 전송
    syncMembersToFirebase() {
      const uploadObj = {};
      this.allowedMembers.forEach(m => {
        uploadObj[m.id] = {
          id: String(m.id),
          name: String(m.name).trim(),
          phoneTail: String(m.phoneTail).trim()
        };
      });
      db.ref('allowedMembers').set(uploadObj);
    },

    syncTripsToFirebase() {
      const dataToSave = {};
      this.trips.forEach(trip => {
        dataToSave[trip.id] = trip;
      });
      db.ref('trips').set(dataToSave);
    },

    getDayOfWeek(dateString) {
      const week = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      const dayIndex = new Date(dateString).getDay();
      return isNaN(dayIndex) ? '' : week[dayIndex];
    },

    get activeTrips() {
      const todayStr = new Date().toISOString().split('T')[0];
      return this.trips.filter(trip => trip.date >= todayStr);
    },

    get myDrivenTrips() {
      if (!this.currentUser) return [];
      return this.trips.filter(trip => trip.driverName === this.currentUser.name);
    },

    // ⚠️ [중요 수정한 곳] 빈칸, 문자열 타입 일치화 필터링 강화로 무조건 로그인 성공 유도
    tryUserLogin() {
      if (!this.loginName.trim() || !this.loginPhoneTail.trim()) {
        return alert('이름과 전화번호 뒷자리를 입력해 주세요.');
      }
      
      const targetName = String(this.loginName).replace(/\s/g, '');
      const targetTail = String(this.loginPhoneTail).replace(/\s/g, '');

      const member = this.allowedMembers.find(m => 
        String(m.name).replace(/\s/g, '') === targetName && 
        String(m.phoneTail).replace(/\s/g, '') === targetTail
      );
      
      if (member) {
        this.currentUser = member;
        this.isAdminAuthenticated = false;
        this.isUserLoggedIn = true;
        this.step = 'passenger';
        alert(`🔓 인증 성공! [${member.name}]님 반갑습니다.`);
      } else {
        alert('❌ 승인된 사용자가 아닙니다. 관리자가 등록한 명단 정보(이름/뒷자리)와 정확히 일치해야 합니다.');
      }
    },

    tryAdminAccess() {
      if (this.adminIdInput.trim() === this.currentAdminId && this.adminPasswordInput === this.currentAdminPassword) {
        this.isAdminAuthenticated = true;
        this.currentUser = { id: 'admin_master', name: '👑 관리자(마스터)', phoneTail: '0000' };
        this.isUserLoggedIn = true;
        this.step = 'admin';
        this.showPasswordModal = false;
        
        this.newAdminId = this.currentAdminId;
        this.newAdminPassword = this.currentAdminPassword;
        this.adminIdInput = '';
        this.adminPasswordInput = '';
        
        alert('👑 마스터 권한으로 원격 관리자 제어실에 진입했습니다.');
      } else {
        alert('❌ 마스터 관리자 인증 정보가 일치하지 않습니다.');
      }
    },

    userLogout() {
      this.isUserLoggedIn = false;
      this.isAdminAuthenticated = false;
      this.currentUser = null;
      this.loginName = '';
      this.loginPhoneTail = '';
      this.lastReservedData = null;
      this.lastDriverActionData = null;
      this.inputDriverPhone = '010-'; 
      this.inputPassengerPhone = '010-';
      this.step = 'passenger';
    },

    updateAdminAccount() {
      if (!this.newAdminId.trim() || !this.newAdminPassword.trim()) {
        return alert('변경할 아이디와 비밀번호를 채워주세요.');
      }
      this.currentAdminId = this.newAdminId.trim();
      this.currentAdminPassword = this.newAdminPassword.trim();
      alert(`⚙️ 관리자 계정 정보가 성공적으로 교체되었습니다.`);
    },

    addAllowedMember() {
      if (!this.newMemberName.trim() || !this.newMemberPhone.trim()) {
        return alert('이름과 전화번호 뒷자리 4자리를 기입해 주세요.');
      }
      
      const memberName = this.newMemberName.trim();
      const memberPhone = this.newMemberPhone.trim();

      if (this.allowedMembers.some(m => String(m.name).trim() === memberName && String(m.phoneTail).trim() === memberPhone)) {
        return alert('⚠️ 이미 등록된 멤버 정보입니다.');
      }

      this.allowedMembers.push({
        id: 'm_' + Date.now(),
        name: memberName,
        phoneTail: memberPhone
      });
      
      this.syncMembersToFirebase();
      alert(`👥 멤버 [${memberName}]님이 실시간 클라우드 명단에 추가되었습니다.`);
      this.newMemberName = '';
      this.newMemberPhone = '';
    },

    removeMember(memberId, name) {
      if (!confirm(`🚨 [${name}] 멤버를 명단에서 삭제하시겠습니까?`)) return;
      this.allowedMembers = this.allowedMembers.filter(m => m.id !== memberId);
      this.syncMembersToFirebase();
      if (this.currentUser && this.currentUser.name === name) this.userLogout();
    },

    registerTrip() {
      let finalDriverName = this.currentUser.name;
      if (!this.inputDate) return alert('운행 날짜를 선택해 주세요.');
      
      let phoneValue = this.inputDriverPhone.trim();
      if (!phoneValue || phoneValue === '010-') return alert('운전자 연락처를 입력해 주세요.');
      if (this.driverOrderedStops.length === 0) return alert('경유 정류소를 하나 이상 지정해 주세요.');
      
      const todayStr = new Date().toISOString().split('T')[0];
      if (this.inputDate < todayStr) return alert('⚠️ 과거 날짜 카풀은 생성할 수 없습니다.');

      const newTrip = {
        id: 'trip_' + Date.now(),
        createdAt: Date.now(),
        driverName: finalDriverName,
        driverPhone: phoneValue, 
        date: this.inputDate,
        dayOfWeek: this.getDayOfWeek(this.inputDate), 
        departureTime: this.inputTime,
        totalSeats: parseInt(this.inputSeats),
        remainingSeats: parseInt(this.inputSeats),
        route: JSON.parse(JSON.stringify(this.driverOrderedStops)),
        passengers: []
      };
      
      this.trips.unshift(newTrip);
      this.syncTripsToFirebase();
      
      alert(`🚗 [등록완료] 카풀 피드가 실시간 연동 인프라에 반영되었습니다.`);
      this.selectedStopIds = [];
      this.driverOrderedStops = [];
      this.inputSeats = 1;
    },

    updateTripSeats(trip, newTotal) {
      newTotal = parseInt(newTotal);
      let approvedSeats = (trip.passengers || [])
        .filter(p => p.status === 'approved')
        .reduce((sum, p) => sum + p.count, 0);

      if (newTotal < approvedSeats) {
        return alert(`❌ 현재 이미 승인 완료된 인원(${approvedSeats}명)보다 적게 좌석을 줄일 수 없습니다.`);
      }

      trip.totalSeats = newTotal;
      trip.remainingSeats = newTotal - approvedSeats;
      this.syncTripsToFirebase();
      alert(`📐 모집 좌석이 총 ${newTotal}석으로 변경되었습니다.`);
    },

    selectTrip(trip) {
      this.selectedTrip = trip;
      this.passengerPickup = ''; 
      this.passengerCount = 1;
      this.inputPassengerPhone = '010-';
    },

    confirmReservation() {
      if (!this.passengerPickup) return alert('탑승할 장소를 선택해 주세요.');
      
      let pPhone = this.inputPassengerPhone.trim();
      if (!pPhone || pPhone === '010-') return alert('동승자 분의 연락처를 입력해 주세요.');
      if (this.selectedTrip.remainingSeats < this.passengerCount) return alert('현재 잔여 좌석이 부족합니다.');
      
      if (!this.selectedTrip.passengers) this.selectedTrip.passengers = [];

      const newPassenger = {
        id: 'ps_' + Date.now(),
        name: this.currentUser.name,
        phone: pPhone,
        count: parseInt(this.passengerCount),
        pickup: this.passengerPickup,
        status: 'pending' 
      };
      
      this.selectedTrip.passengers.push(newPassenger);
      this.syncTripsToFirebase();

      this.lastReservedData = {
        driverName: this.selectedTrip.driverName,
        driverPhone: this.selectedTrip.driverPhone, 
        date: this.selectedTrip.date,
        time: this.selectedTrip.departureTime,
        passengerName: newPassenger.name,
        count: newPassenger.count,
        pickup: newPassenger.pickup
      };

      alert('🎉 실시간 카풀 탑승 신청이 완료되었습니다.');
    },

    acceptPassenger(trip, passenger) {
      if (trip.remainingSeats < passenger.count) return alert('❌ 차량 잔여 좌석이 부족하여 수락할 수 없습니다.');
      
      passenger.status = 'approved';
      trip.remainingSeats -= passenger.count;
      this.syncTripsToFirebase();

      this.lastDriverActionData = {
        type: '수락',
        passengerName: passenger.name,
        passengerPhone: passenger.phone,
        date: trip.date,
        time: trip.departureTime,
        pickup: passenger.pickup,
        count: passenger.count,
        driverName: trip.driverName
      };
    },

    rejectPassenger(trip, passenger) {
      if (passenger.status === 'approved') {
        trip.remainingSeats += passenger.count;
      }
      passenger.status = 'rejected';
      this.syncTripsToFirebase();

      this.lastDriverActionData = {
        type: '거절',
        passengerName: passenger.name,
        passengerPhone: passenger.phone,
        date: trip.date,
        time: trip.departureTime,
        pickup: passenger.pickup,
        count: passenger.count,
        driverName: trip.driverName
      };
    },

    sendDriverSms() {
      if (!this.lastDriverActionData) return;
      const d = this.lastDriverActionData;
      const message = `[창원경화카풀] 신청결과\n▶${d.passengerName}님 신청 건\n▶일시: ${d.date} (${d.time})\n▶결과: 카풀 탑승이 [${d.type}] 되었습니다.\n- 운전자: ${d.driverName}`;
      window.location.href = `sms:${d.passengerPhone}?body=${encodeURIComponent(message)}`;
    },

    copyDriverKakaoText() {
      if (!this.lastDriverActionData) return;
      const d = this.lastDriverActionData;
      const message = `[창원경화카풀 알림]\n• ${d.passengerName}님 카풀 신청이 [${d.type}] 되었습니다.\n• 일시: ${d.date} [${d.time}]\n• 픽업지: ${d.pickup} (${d.count}명)\n\n카톡방에 붙여넣어 결과를 공유해 주세요!`;
      navigator.clipboard.writeText(message).then(() => alert('📋 카톡 공유용 내용이 복사되었습니다!')).catch(() => alert('복사 실패'));
    },

    sendSmsNotification() {
      if (!this.lastReservedData) return;
      const d = this.lastReservedData;
      const message = `[창원경화카풀] 예약요청\n▶운전자: ${d.driverName}님\n▶운행일시: ${d.date} (${d.time})\n▶탑승신청자: ${d.passengerName} (${d.count}명)\n▶픽업장소: ${d.pickup}\n\n매칭 승인 대기 중입니다. 앱에서 확인 후 수락 부탁드립니다!`;
      window.location.href = `sms:${d.driverPhone}?body=${encodeURIComponent(message)}`;
    },

    copyKakaoText() {
      if (!this.lastReservedData) return;
      const d = this.lastReservedData;
      const message = `[창원경화카풀 탑승요청]\n• 운전자: ${d.driverName}님\n• 일시: ${d.date} [${d.time}]\n• 동승자: ${d.passengerName} (${d.count}명)\n• 픽업지: ${d.pickup}\n\n운전자님 앱에서 확인 후 [수락] 버튼을 눌러주세요!`;
      navigator.clipboard.writeText(message).then(() => alert('📋 클립보드에 복사되었습니다!')).catch(() => alert('복사 실패'));
    },

    cancelPassengerBooking(trip, passenger, isAdminAction = false) {
      if (!confirm(isAdminAction ? `🚨 [관리자 조치] 예약을 강제 취소할까요?` : '작성하신 탑승 신청을 취소하시겠습니까?')) return;
      
      if (passenger.status === 'approved') {
        trip.remainingSeats += passenger.count;
      }
      
      trip.passengers = (trip.passengers || []).filter(p => p.id !== passenger.id);
      if (this.selectedTrip && this.selectedTrip.id === trip.id) this.selectedTrip = null;
      this.lastReservedData = null;
      
      this.syncTripsToFirebase();
      alert('❌ 탑승 신청 취소가 처리되었습니다.');
    },

    driverResetAction() {
      this.lastDriverActionData = null;
    },

    cancelDriverTrip(trip, isAdminAction = false) {
      if (!confirm(isAdminAction ? `🚨 [관리자 조치] 카풀 일정을 원격 파기할까요?` : '등록하신 카풀 전체 일정을 취소하시겠습니까?')) return;
      this.trips = this.trips.filter(t => t.id !== trip.id);
      this.selectedTrip = null;
      this.lastReservedData = null;
      this.lastDriverActionData = null;
      
      this.syncTripsToFirebase();
      alert('❌ 카풀 등록 일정이 완전히 파기되었습니다.');
    }
  }" x-init="initSystem()" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col h-[880px] relative">

    <!-- 상단 앱 브랜딩 바 -->

        </div>
      </div>
    </div>

    <!-- ==================== [🚪 CASE A. 로그아웃 대기 화면] ==================== -->
    <template x-if="!isUserLoggedIn">
      <div class="flex-1 flex flex-col justify-center items-center p-6 space-y-6 bg-gray-50">
        <div class="text-center space-y-2">
          <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center text-2xl mx-auto shadow-xs">🌐</div>
          <h2 class="text-lg font-black text-gray-900">창원경화카풀 실시간 네트워크</h2>
          <p class="text-xs text-gray-500 leading-relaxed">
            클라우드 데이터베이스와 양방향 연동 중입니다.<br>

          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1">성명(실명)</label>
            <input type="text" x-model="loginName" placeholder="예: 홍길동" class="w-full p-2.5 text-xs border border-gray-200 rounded-xl font-bold bg-gray-50 focus:bg-white focus:outline-none">

            <input type="password" maxlength="4" x-model="loginPhoneTail" placeholder="예: 1234" class="w-full p-2.5 text-xs border border-gray-200 rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:outline-none" @keydown.enter="tryUserLogin()">
          </div>

      </div>
    </template>

    <!-- ==================== [📱 CASE B. 정상 가동 상태 메인 인터페이스] ==================== -->
    <template x-if="isUserLoggedIn">

        <!-- 스크롤 컨테이너 -->
        <div class="flex-1 overflow-y-auto p-5 space-y-5">

          <!-- 👑 [🛠️ 1. 관리자 전용 마스터 컨트롤 본문] -->
          <template x-if="step === 'admin' && isAdminAuthenticated">

                                    x-text="p.status === 'pending' ? '승인 대기' : p.status === 'approved' ? '수락됨' : '거절됨'"></span>
                            </div>
                            <div class="text-[10px] text-gray-500" x-text="`📱 연락처: ${p.phone} | 📍 픽업: ${p.pickup}`"></div>
                            
                            <div class="flex gap-1 pt-0.5">

                              <button @click="acceptPassenger(trip, p)" class="flex-1 bg-blue-600 text-white py-1 rounded-lg text-[11px] font-bold cursor-pointer">수락</button>
                            </div>

                    </div>

                    <div class="flex flex-wrap items-center gap-1 text-[10px] text-gray-500 bg-gray-50 p-2 rounded-lg border border-gray-100">
                      <template x-for="(st, idx) in trip.route" :key="st.id">

                        <div class="flex justify-between items-center p-2 rounded text-[11px] font-bold"
                             :class="p.status === 'approved' ? 'bg-emerald-50 text-emerald-800' : p.status === 'rejected' ? 'bg-red-50 text-red-600' : 'bg-amber-50 text-amber-800'">
                          <span x-text="p.status === 'pending' ? '⏳ 신청 접수: 대기 중' : p.status === 'approved' ? '✅ 신청 결과: 수락됨🎉' : '❌ 매칭 거절됨'"></span>
                          <button @click="cancelPassengerBooking(trip, p)" class="bg-gray-800 text-white font-normal text-[9px] px-2 py-0.5 rounded cursor-pointer">취소</button>
                        </div>
                      </template>

                      <div class="flex justify-between items-center mt-1">
                        <span class="text-[11px] text-gray-500 font-bold" x-text="`잔여: ${trip.remainingSeats}석 / 전체: ${trip.totalSeats}석`"></span>
                        <button @click="selectTrip(trip)" class="bg-emerald-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs cursor-pointer">탑승 신청</button>
                      </div>
                    </div>

                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- [🙋‍♀️ 동승자 모드: 픽업 신청 폼] -->
          <template x-if="step === 'passenger' && selectedTrip">
            <div class="space-y-4">
              <button @click="selectedTrip = null;" class="text-gray-400 text-xs bg-gray-100 px-2 py-1 rounded-md cursor-pointer">← 목록으로</button>

              <div class="p-3 bg-emerald-50 rounded-xl text-xs font-bold text-emerald-900" x-text="`${selectedTrip.date} [${selectedTrip.departureTime}] | 운전자: ${selectedTrip.driverName}`"></div>

              <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-200 space-y-1">
                <label class="block text-xs font-black text-emerald-900">📞 연락처 입력</label>
                <input type="tel" x-model="inputPassengerPhone" class="w-full p-2 text-xs border border-emerald-300 rounded-lg bg-white font-bold text-gray-800 focus:outline-none">
              </div>

              <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 flex justify-between items-center text-xs">
                <label class="font-bold text-gray-700">👥 탑승 요청 인원</label>
                <select x-model="passengerCount" class="bg-white border p-1 rounded-lg font-bold">
                  <option value="1">1명</option><option value="2">2명</option><option value="3">3명</option>
                </select>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700 block">👋 탑승 희망지 선택</label>
                <div class="space-y-1 max-h-48 overflow-y-auto">
                  <template x-for="stop in selectedTrip.route" :key="stop.id">
                    <label :class="passengerPickup === stop.name ? 'border-emerald-600 bg-emerald-50' : 'border-gray-200'" 
                           class="flex items-center gap-2.5 p-2.5 border rounded-xl cursor-pointer text-xs bg-white">
                      <input type="radio" name="p_pickup_v25" :value="stop.name" x-model="passengerPickup" class="w-3.5 h-3.5 text-emerald-600">
                      <span class="font-extrabold text-gray-800" x-text="stop.name"></span>
                    </label>
                  </template>
                </div>
              </div>

              <button @click="confirmReservation(); selectedTrip = null;" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-xs shadow-md cursor-pointer">
                ⚡ 최종 탑승 신청 완료
              </button>
            </div>
          </template>

        </div>
      </div>
    </template>

    <!-- 관리자 인증 모달 -->
    <div x-show="showPasswordModal" class="absolute inset-0 bg-black/60 flex justify-center items-center p-6 z-50" x-transition>
      <div class="bg-white rounded-2xl p-5 w-full max-w-xs space-y-3 shadow-2xl">
        <h3 class="text-xs font-black text-gray-900 text-center">🔒 마스터 제어실 보안 인증</h3>
        <div class="space-y-2">
          <input type="text" x-model="adminIdInput" placeholder="관리자 ID" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:outline-none">
          <input type="password" x-model="adminPasswordInput" @keydown.enter="tryAdminAccess()" placeholder="비밀번호" class="w-full p-2 text-xs border border-gray-200 rounded-lg text-center bg-gray-50 font-bold focus:outline-none">
        </div>
        <div class="flex gap-2">
          <button @click="showPasswordModal = false;" class="flex-1 bg-gray-200 text-gray-600 font-bold py-1.5 rounded-lg text-xs cursor-pointer">취소</button>
          <button @click="tryAdminAccess()" class="flex-1 bg-red-600 text-white font-bold py-1.5 rounded-lg text-xs cursor-pointer">인증</button>
        </div>
      </div>
    </div>

    <!-- 하단 고정 바 -->
    <div class="p-2.5 bg-gray-50 border-t border-gray-100 text-center text-[10px] text-gray-400 font-semibold shrink-0">
      창원경화카풀 동기화 픽스 안정화 모델 v25 © 2026
    </div>
  </div>

</body>
</html>
