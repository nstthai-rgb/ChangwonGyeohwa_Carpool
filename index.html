<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창원경화카풀 시스템 v31</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyAr6TlLN5_SPZwfnGgyxQkR3zQrtPIbOKg",
  authDomain: "changwongyeonghwa-carpool.firebaseapp.com",
  databaseURL: "https://changwongyeonghwa-carpool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "changwongyeonghwa-carpool",
  storageBucket: "changwongyeonghwa-carpool.firebasestorage.app",
  messagingSenderId: "595964487926",
  appId: "1:595964487926:web:fff99d69b0b05bb04ee4d7",
  measurementId: "G-K6XS5LF6XV"
};
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center p-4 selection:bg-emerald-200">

  <div x-data="{
    step: 'passenger', 
    notice: '📢 운전자와 동승자가 여러 차례 충분한 의사 소통을 하세요.',

    isUserLoggedIn: false, 
    loginName: '',
    loginPasswordInput: '', 
    currentUser: null, 

    isAdminAuthenticated: false,
    adminIdInput: '',
    adminPasswordInput: '',
    
    currentAdminId: 'admin',
    currentAdminPassword: '1914', 
    
    newAdminId: '',
    newAdminPassword: '',
    showPasswordModal: false,
    showMyInfoModal: false, 

    myNewPassword: '',
    sessionTimeoutMins: 180, 

    allowedMembers: [],
    newMemberName: '',
    newMemberPhone: '',
    bulkMemberInput: '', 

    masterStops: [],
    newStopName: '',

    msgTemplatePassenger: '[창원경화카풀 탑승요청]\n• 운전자: {driverName}님\n• 일시: {date} [{time}]\n• 동승자: {passengerName} ({count}명)\n• 픽업지: {pickup}\n• 타입: {type}\n\n운전자님 수락 부탁드립니다!',
    msgTemplateDriver: '[창원경화카풀 알림]\n• {passengerName}님 카풀 신청이 [{status}] 되었습니다.\n• 일시: {date} [{time}]\n• 픽업지: {pickup} ({count}명)\n• 타입: {type}\n- 운전자: {driverName}',

    inputDate: '', 
    inputTime: '18:30',
    inputSeats: 1, 
    inputDriverPhone: '010-', 
    selectedStopIds: [], 
    driverOrderedStops: [],
    inputPassengerPhone: '010-',
    
    // 운전자 운행 타입 선택 ('go' = 가는 길, 'back' = 오는 길)
    driverDriveType: ['go', 'back'], 

    draggedIndex: null,
    touchStartY: 0,
    currentTouchIndex: null,
    draggedAdminIndex: null,
    touchAdminStartY: 0,
    currentTouchAdminIndex: null,

    trips: [],

    selectedTrip: null,
    passengerPickup: '',
    passengerCount: 1,
    passengerTypeSelection: 'go', 
    
    lastReservedData: null, 
    lastDriverActionData: null, 

    initSystem() {
      const today = new Date();
      this.inputDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      db.ref('systemNotice').on('value', (snapshot) => { if (snapshot.val()) this.notice = snapshot.val(); });
      db.ref('adminAccount').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { this.currentAdminId = data.id || 'admin'; this.currentAdminPassword = data.password || '1914'; }
      });

      db.ref('msgTemplatePassenger').on('value', (snapshot) => { if(snapshot.val()) this.msgTemplatePassenger = snapshot.val(); });
      db.ref('msgTemplateDriver').on('value', (snapshot) => { if(snapshot.val()) this.msgTemplateDriver = snapshot.val(); });
      db.ref('sessionTimeoutMins').on('value', (snapshot) => {
        if (snapshot.val() !== null) this.sessionTimeoutMins = parseInt(snapshot.val());
        this.checkLoginSession();
      });

      db.ref('allowedMembers').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          this.allowedMembers = Object.values(data).map(m => ({
            id: String(m.id), name: String(m.name).trim(), phoneTail: String(m.phoneTail).trim(),
            password: m.password ? String(m.password).trim() : '4321',
            failCount: m.failCount !== undefined ? parseInt(m.failCount) : 0, isLocked: m.isLocked || false
          }));
          if (this.currentUser && this.currentUser.id !== 'admin_master') {
            const updatedMe = this.allowedMembers.find(m => m.id === this.currentUser.id);
            if (updatedMe) this.currentUser = updatedMe;
          }
        }
      });

      db.ref('masterStops').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          let parsedStops = Object.values(data).map(s => ({ id: String(s.id), name: String(s.name).trim(), sortOrder: s.sortOrder !== undefined ? parseInt(s.sortOrder) : 999 }));
          parsedStops.sort((a, b) => a.sortOrder - b.sortOrder);
          this.masterStops = parsedStops;
        }
      });

      db.ref('trips').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          let parsedTrips = Object.values(data);
          parsedTrips.sort((a, b) => b.createdAt - a.createdAt);
          this.trips = parsedTrips;
          if (this.selectedTrip) {
            const updated = this.trips.find(t => t.id === this.selectedTrip.id);
            if (updated) this.selectedTrip = updated;
          }
        }
      });
    },

    checkLoginSession() {
      const sessionData = localStorage.getItem('carpool_session');
      if (!sessionData) return;
      try {
        const session = JSON.parse(sessionData);
        if ((Date.now() - session.loginTime) / (1000 * 60) > this.sessionTimeoutMins) {
          this.userLogout();
          alert('⏱️ 세션 유지 시간이 만료되어 자동 로그아웃 되었습니다.');
        } else {
          this.currentUser = session.user; this.isAdminAuthenticated = session.isAdmin || false;
          this.isUserLoggedIn = true; this.step = this.isAdminAuthenticated ? 'admin' : 'passenger';
        }
      } catch (e) { this.userLogout(); }
    },

    saveSessionToStorage(user, isAdmin = false) { localStorage.setItem('carpool_session', JSON.stringify({ user, isAdmin, loginTime: Date.now() })); },
    rebuildDriverRoute() {
      let currentStops = this.masterStops.filter(stop => this.selectedStopIds.includes(stop.id));
      let newOrdered = [];
      this.driverOrderedStops.forEach(os => { if (currentStops.some(cs => cs.id === os.id)) newOrdered.push(os); });
      currentStops.forEach(cs => { if (!newOrdered.some(no => no.id === cs.id)) newOrdered.push(cs); });
      this.driverOrderedStops = newOrdered;
    },

    handleDragStart(index, event) { this.draggedIndex = index; event.dataTransfer.effectAllowed = 'move'; },
    handleDragOver(index, event) {
      event.preventDefault();
      if (this.draggedIndex === null || this.draggedIndex === index) return;
      this.swapRouteItems(this.draggedIndex, index); this.draggedIndex = index;
    },
    handleDragEnd() { this.draggedIndex = null; },
    handleTouchStart(index, event) { this.currentTouchIndex = index; this.touchStartY = event.touches[0].clientY; },
    handleTouchMove(index, event) {
      if (this.currentTouchIndex === null) return;
      const currentY = event.touches[0].clientY; const diffY = currentY - this.touchStartY;
      if (Math.abs(diffY) > 30) {
        const targetIndex = diffY > 0 ? index + 1 : index - 1;
        if (targetIndex >= 0 && targetIndex < this.driverOrderedStops.length) {
          this.swapRouteItems(index, targetIndex); this.currentTouchIndex = targetIndex; this.touchStartY = currentY; 
        }
      }
    },
    handleTouchEnd() { this.currentTouchIndex = null; },
    swapRouteItems(fromIndex, toIndex) {
      let targetArray = [...this.driverOrderedStops];
      const movedItem = targetArray.splice(fromIndex, 1)[0];
      targetArray.splice(toIndex, 0, movedItem); this.driverOrderedStops = targetArray;
    },

    handleAdminDragStart(index, event) { this.draggedAdminIndex = index; event.dataTransfer.effectAllowed = 'move'; },
    handleAdminDragOver(index, event) {
      event.preventDefault();
      if (this.draggedAdminIndex === null || this.draggedAdminIndex === index) return;
      this.swapAdminStops(this.draggedAdminIndex, index); this.draggedAdminIndex = index;
    },
    handleAdminDragEnd() { this.draggedAdminIndex = null; this.syncMasterStopsToFirebase(); },
    handleAdminTouchStart(index, event) { this.currentTouchAdminIndex = index; this.touchAdminStartY = event.touches[0].clientY; },
    handleAdminTouchMove(index, event) {
      if (this.currentTouchAdminIndex === null) return;
      const currentY = event.touches[0].clientY; const diffY = currentY - this.touchAdminStartY;
      if (Math.abs(diffY) > 30) {
        const targetIndex = diffY > 0 ? index + 1 : index - 1;
        if (targetIndex >= 0 && targetIndex < this.masterStops.length) {
          this.swapAdminStops(index, targetIndex); this.currentTouchAdminIndex = targetIndex; this.touchAdminStartY = currentY;
        }
      }
    },
    handleAdminTouchEnd() { this.currentTouchAdminIndex = null; this.syncMasterStopsToFirebase(); },
    swapAdminStops(fromIndex, toIndex) {
      let targetArray = [...this.masterStops];
      const movedItem = targetArray.splice(fromIndex, 1)[0];
      targetArray.splice(toIndex, 0, movedItem); this.masterStops = targetArray;
    },

    syncMembersToFirebase() {
      const uploadObj = {};
      this.allowedMembers.forEach(m => { uploadObj[m.id] = { id: m.id, name: m.name, phoneTail: m.phoneTail, password: m.password, failCount: m.failCount, isLocked: m.isLocked }; });
      db.ref('allowedMembers').set(uploadObj);
    },
    syncMasterStopsToFirebase() {
      const uploadObj = {};
      this.masterStops.forEach((s, idx) => { uploadObj[s.id] = { id: s.id, name: s.name, sortOrder: idx }; });
      db.ref('masterStops').set(uploadObj);
    },
    syncTripsToFirebase() {
      const dataToSave = {}; this.trips.forEach(trip => { dataToSave[trip.id] = trip; }); db.ref('trips').set(dataToSave);
    },

    updateSystemNotice() { db.ref('systemNotice').set(this.notice); alert('📢 공지사항이 반영되었습니다.'); },
    updateSessionTimeout() {
      const targetVal = parseInt(this.sessionTimeoutMins);
      if (isNaN(targetVal) || targetVal <= 0) return alert('정확한 분 단위를 입력해 주세요.');
      db.ref('sessionTimeoutMins').set(targetVal); alert(`⏱️ 자동 로그아웃 시간이 [${targetVal}분]으로 저장되었습니다.`);
    },
    updateMsgTemplates() {
      db.ref('msgTemplatePassenger').set(this.msgTemplatePassenger); db.ref('msgTemplateDriver').set(this.msgTemplateDriver);
      alert('💬 알림 메시지 기본 문구가 저장되었습니다.');
    },

    getDayOfWeek(dateString) { return ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'][new Date(dateString).getDay()] || ''; },
    isSunday(dateString) { return new Date(dateString).getDay() === 0; },

    get activeTrips() { const todayStr = new Date().toISOString().split('T')[0]; return this.trips.filter(trip => trip.date >= todayStr); },
    get myDrivenTrips() { return this.currentUser ? this.trips.filter(trip => trip.driverName === this.currentUser.name) : []; },

    tryUserLogin() {
      if (!this.loginName.trim() || !this.loginPasswordInput.trim()) return alert('이름과 비밀번호를 입력해 주세요.');
      const targetName = String(this.loginName).replace(/\s/g, '');
      const member = this.allowedMembers.find(m => String(m.name).replace(/\s/g, '') === targetName);
      
      if (!member) return alert('❌ 승인된 사용자가 아닙니다.');
      if (member.isLocked) return alert('🔒 비밀번호 5회 오류로 계정이 잠겼습니다. 관리자에게 해제를 요청하세요.');

      if (member.password === this.loginPasswordInput.trim()) {
        member.failCount = 0; this.syncMembersToFirebase(); this.currentUser = member;
        this.isAdminAuthenticated = false; this.isUserLoggedIn = true; this.step = 'passenger';
        this.saveSessionToStorage(member, false); this.loginPasswordInput = '';
      } else {
        member.failCount = (member.failCount || 0) + 1;
        if (member.failCount >= 5) { member.isLocked = true; alert('🚨 계정이 잠겼습니다.'); }
        else { alert(`❌ 비밀번호 오류 (${member.failCount}/5)`); }
        this.syncMembersToFirebase();
      }
    },

    changeMyPassword() {
      if(!this.myNewPassword.trim()) return alert('새 비밀번호를 입력하세요.');
      const member = this.allowedMembers.find(m => m.id === this.currentUser.id);
      if(member) { member.password = this.myNewPassword.trim(); this.syncMembersToFirebase(); this.currentUser = member; this.showMyInfoModal = false; this.myNewPassword = ''; alert('🔑 비밀번호가 변경되었습니다.'); }
    },

    resetMemberPassword(memberId) {
      const member = this.allowedMembers.find(m => m.id === memberId);
      if (member) { member.password = '4321'; member.failCount = 0; member.isLocked = false; this.syncMembersToFirebase(); alert('⚙️ 암호가 초기화되었습니다.'); }
    },
    unlockMember(memberId) {
      const member = this.allowedMembers.find(m => m.id === memberId);
      if (member) { member.isLocked = false; member.failCount = 0; this.syncMembersToFirebase(); alert('⚙️ 잠금이 해제되었습니다.'); }
    },

    tryAdminAccess() {
      if (this.adminIdInput.trim() === this.currentAdminId && this.adminPasswordInput === this.currentAdminPassword) {
        this.isAdminAuthenticated = true; this.currentUser = { id: 'admin_master', name: '👑 관리자', phoneTail: '0000' };
        this.isUserLoggedIn = true; this.step = 'admin'; this.showPasswordModal = false;
        this.newAdminId = this.currentAdminId; this.newAdminPassword = this.currentAdminPassword;
        this.adminIdInput = ''; this.adminPasswordInput = ''; this.saveSessionToStorage(this.currentUser, true);
      } else { alert('❌ 관리자 정보 불일치'); }
    },

    userLogout() {
      this.isUserLoggedIn = false; this.isAdminAuthenticated = false; this.currentUser = null;
      this.loginName = ''; this.loginPasswordInput = ''; this.lastReservedData = null; this.lastDriverActionData = null;
      this.inputDriverPhone = '010-'; this.inputPassengerPhone = '010-'; this.step = 'passenger'; localStorage.removeItem('carpool_session');
    },

    updateAdminAccount() {
      if (!this.newAdminId.trim() || !this.newAdminPassword.trim()) return alert('정보를 기입하세요.');
      db.ref('adminAccount').set({ id: this.newAdminId.trim(), password: this.newAdminPassword.trim() }); alert('⚙️ 변경 완료');
    },

    addAllowedMember() {
      if (!this.newMemberName.trim() || !this.newMemberPhone.trim()) return alert('정보 부족');
      this.allowedMembers.push({ id: 'm_' + Date.now(), name: this.newMemberName.trim(), phoneTail: this.newMemberPhone.trim(), password: '4321', failCount: 0, isLocked: false });
      this.syncMembersToFirebase(); this.newMemberName = ''; this.newMemberPhone = '';
    },

    addBulkMembers() {
      if(!this.bulkMemberInput.trim()) return alert('명단을 입력해 주세요.');
      const lines = this.bulkMemberInput.split('\n'); let count = 0;
      lines.forEach(line => {
        if(!line.trim()) return; const tokens = line.split(',');
        if(tokens.length >= 2) {
          const name = tokens[0].trim(); const phone = tokens[1].trim();
          if(name && phone && !this.allowedMembers.some(m => m.name === name && m.phoneTail === phone)) {
            this.allowedMembers.push({ id: 'm_blk_' + Date.now() + '_' + Math.random().toString(36).substr(2,4), name, phoneTail: phone, password: '4321', failCount: 0, isLocked: false }); count++;
          }
        }
      });
      this.syncMembersToFirebase(); this.bulkMemberInput = ''; alert(`👥 ${count}명 일괄 등록 완료`);
    },

    removeMember(memberId, name) {
      if (!confirm('삭제하시겠습니까?')) return; this.allowedMembers = this.allowedMembers.filter(m => m.id !== memberId); this.syncMembersToFirebase();
    },
    addMasterStop() {
      if (!this.newStopName.trim()) return alert('이름 입력');
      this.masterStops.push({ id: 'stop_' + Date.now(), name: this.newStopName.trim(), sortOrder: this.masterStops.length }); this.syncMasterStopsToFirebase(); this.newStopName = '';
    },
    removeMasterStop(stopId, name) {
      if (!confirm('삭제하시겠습니까?')) return; this.masterStops = this.masterStops.filter(s => s.id !== stopId); this.selectedStopIds = this.selectedStopIds.filter(id => id !== stopId); this.rebuildDriverRoute(); this.syncMasterStopsToFirebase();
    },

    // 🚗 카풀 등록 시 '가는 길' + '오는 길' = '왕복' 자동 전환 로직 탑재 검토 완료
    registerTrip() {
      let finalDriverName = this.currentUser.name;
      if (!this.inputDate) return alert('날짜를 선택해 주세요.');
      if (!this.inputDriverPhone.trim() || this.inputDriverPhone === '010-') return alert('연락처를 입력해 주세요.');
      if (this.driverOrderedStops.length === 0) return alert('정류소를 선택해 주세요.');
      if (this.driverDriveType.length === 0) return alert('운행 형태를 선택해 주세요.');
      if (this.inputDate < new Date().toISOString().split('T')[0]) return alert('지난 날짜 등록 불가');

      // 💡 [핵심] 두 개 모두 체크되면 동승자 목록 스크린에 '왕복'으로 명시되게 문자열 바인딩
      let typeText = '';
      if (this.driverDriveType.includes('go') && this.driverDriveType.includes('back')) {
        typeText = '왕복';
      } else if (this.driverDriveType.includes('go')) {
        typeText = '가는 길';
      } else if (this.driverDriveType.includes('back')) {
        typeText = '오는 길';
      }

      const newTrip = {
        id: 'trip_' + Date.now(), createdAt: Date.now(), driverName: finalDriverName, driverPhone: this.inputDriverPhone.trim(),
        date: this.inputDate, dayOfWeek: this.getDayOfWeek(this.inputDate), departureTime: this.inputTime,
        totalSeats: parseInt(this.inputSeats), remainingSeats: parseInt(this.inputSeats),
        route: JSON.parse(JSON.stringify(this.driverOrderedStops)), driveType: typeText, passengers: []
      };
      
      this.trips.unshift(newTrip); this.syncTripsToFirebase();
      alert(`🚗 [${typeText}] 일정이 정상 등록되었습니다.`);
      this.selectedStopIds = []; this.driverOrderedStops = []; this.inputSeats = 1;
    },

    updateTripSeats(trip, newTotal) {
      newTotal = parseInt(newTotal); let approvedSeats = (trip.passengers || []).filter(p => p.status === 'approved').reduce((sum, p) => sum + p.count, 0);
      if (newTotal < approvedSeats) return alert('수락 인원보다 작게 설정할 수 없습니다.');
      trip.totalSeats = newTotal; trip.remainingSeats = newTotal - approvedSeats; this.syncTripsToFirebase();
    },

    selectTrip(trip) {
      this.selectedTrip = trip; this.passengerPickup = ''; this.passengerCount = 1; this.inputPassengerPhone = '010-';
      this.passengerTypeSelection = trip.driveType === '오는 길' ? 'back' : 'go';
    },

    confirmReservation() {
      if (!this.passengerPickup) return alert('정류소를 선택해 주세요.');
      if (!this.inputPassengerPhone.trim() || this.inputPassengerPhone === '010-') return alert('연락처를 입력해 주세요.');
      if (this.selectedTrip.remainingSeats < this.passengerCount) return alert('좌석 부족');
      
      let pTypeText = '';
      if(this.selectedTrip.driveType !== '왕복') {
        pTypeText = this.selectedTrip.driveType; 
      } else {
        if(this.passengerTypeSelection === 'go') pTypeText = '가는 길';
        else if(this.passengerTypeSelection === 'back') pTypeText = '오는 길';
        else pTypeText = '왕복 모두';
      }

      if (!this.selectedTrip.passengers) this.selectedTrip.passengers = [];
      const newPassenger = { id: 'ps_' + Date.now(), name: this.currentUser.name, phone: this.inputPassengerPhone.trim(), count: parseInt(this.passengerCount), pickup: this.passengerPickup, status: 'pending', requestedType: pTypeText };
      this.selectedTrip.passengers.push(newPassenger); this.syncTripsToFirebase();

      this.lastReservedData = { driverName: this.selectedTrip.driverName, driverPhone: this.selectedTrip.driverPhone, date: this.selectedTrip.date, time: this.selectedTrip.departureTime, passengerName: newPassenger.name, count: newPassenger.count, pickup: newPassenger.pickup, type: pTypeText };
      alert('🎉 신청이 전송되었습니다.');
    },

    acceptPassenger(trip, passenger) {
      if (trip.remainingSeats < passenger.count) return alert('좌석 부족');
      passenger.status = 'approved'; trip.remainingSeats -= passenger.count; this.syncTripsToFirebase();
      this.lastDriverActionData = { status: '수락', passengerName: passenger.name, passengerPhone: passenger.phone, date: trip.date, time: trip.departureTime, pickup: passenger.pickup, count: passenger.count, type: passenger.requestedType || '기본', driverName: trip.driverName };
    },

    rejectPassenger(trip, passenger) {
      if (passenger.status === 'approved') trip.remainingSeats += passenger.count;
      passenger.status = 'rejected'; this.syncTripsToFirebase();
      this.lastDriverActionData = { status: '거절', passengerName: passenger.name, passengerPhone: passenger.phone, date: trip.date, time: trip.departureTime, pickup: passenger.pickup, count: passenger.count, type: passenger.requestedType || '기본', driverName: trip.driverName };
    },

    sendDriverSms() {
      if (!this.lastDriverActionData) return; const d = this.lastDriverActionData;
      let message = this.msgTemplateDriver.replace(/{passengerName}/g, d.passengerName).replace(/{status}/g, d.status).replace(/{date}/g, d.date).replace(/{time}/g, d.time).replace(/{pickup}/g, d.pickup).replace(/{count}/g, d.count).replace(/{type}/g, d.type).replace(/{driverName}/g, d.driverName);
      window.location.href = `sms:${d.passengerPhone}?body=${encodeURIComponent(message)}`;
    },
    copyDriverKakaoText() {
      if (!this.lastDriverActionData) return; const d = this.lastDriverActionData;
      let message = this.msgTemplateDriver.replace(/{passengerName}/g, d.passengerName).replace(/{status}/g, d.status).replace(/{date}/g, d.date).replace(/{time}/g, d.time).replace(/{pickup}/g, d.pickup).replace(/{count}/g, d.count).replace(/{type}/g, d.type).replace(/{driverName}/g, d.driverName);
      navigator.clipboard.writeText(message).then(() => alert('📋 복사완료'));
    },
    sendSmsNotification() {
      if (!this.lastReservedData) return; const d = this.lastReservedData;
      let message = this.msgTemplatePassenger.replace(/{driverName}/g, d.driverName).replace(/{date}/g, d.date).replace(/{time}/g, d.time).replace(/{passengerName}/g, d.passengerName).replace(/{count}/g, d.count).replace(/{pickup}/g, d.pickup).replace(/{type}/g, d.type);
      window.location.href = `sms:${d.driverPhone}?body=${encodeURIComponent(message)}`;
    },
    copyKakaoText() {
      if (!this.lastReservedData) return; const d = this.lastReservedData;
      let message = this.msgTemplatePassenger.replace(/{driverName}/g, d.driverName).replace(/{date}/g, d.date).replace(/{time}/g, d.time).replace(/{passengerName}/g, d.passengerName).replace(/{count}/g, d.count).replace(/{pickup}/g, d.pickup).replace(/{type}/g, d.type);
      navigator.clipboard.writeText(message).then(() => alert('📋 복사완료'));
    },

    cancelPassengerBooking(trip, passenger, isAdminAction = false) {
      if (!confirm('취소하시겠습니까?')) return; if (passenger.status === 'approved') trip.remainingSeats += passenger.count;
      trip.passengers = (trip.passengers || []).filter(p => p.id !== passenger.id); if (this.selectedTrip && this.selectedTrip.id === trip.id) this.selectedTrip = null;
      this.lastReservedData = null; this.syncTripsToFirebase();
    },
    driverResetAction() { this.lastDriverActionData = null; },
    cancelDriverTrip(trip, isAdminAction = false) {
      if (!confirm('파기하시겠습니까?')) return; this.trips = this.trips.filter(t => t.id !== trip.id);
      this.selectedTrip = null; this.lastReservedData = null; this.lastDriverActionData = null; this.syncTripsToFirebase();
    }
  }" x-init="initSystem()" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col h-[880px] relative">

    <div class="bg-gray-900 text-white px-4 py-3 flex justify-between items-center text-xs shrink-0">
      <div class="flex items-center gap-2 w-full">
        <span class="text-emerald-400 font-black tracking-wider text-sm">🚗 창원경화카풀 v31</span>
        <div class="flex items-center gap-2 ml-auto" x-show="isUserLoggedIn">
          <button @click="if(currentUser.id !== 'admin_master') { showMyInfoModal = true; myNewPassword = currentUser.password; }" class="text-gray-300 font-bold bg-gray-800 px-2 py-0.5 rounded cursor-pointer" x-text="`👤 ${currentUser?.name}님`"></button>
          <button @click="userLogout()" class="bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded text-[10px] font-bold">로그아웃</button>
        </div>
      </div>
    </div>

    <template x-if="!isUserLoggedIn">
      <div class="flex-1 flex flex-col justify-center items-center p-6 space-y-6 bg-gray-50 overflow-y-auto">
        <div class="text-center space-y-2">
          <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center text-2xl mx-auto">🌐</div>
          <h2 class="text-lg font-black text-gray-900">창원경화카풀 시스템</h2>
        </div>
        <div class="w-full bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-3.5">
          <input type="text" x-model="loginName" placeholder="실명 입력" class="w-full p-2.5 text-xs border rounded-xl font-bold bg-gray-50 focus:bg-white focus:outline-none">
          <input type="password" x-model="loginPasswordInput" placeholder="비밀번호 입력" class="w-full p-2.5 text-xs border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:outline-none" @keydown.enter="tryUserLogin()">
          <button @click="tryUserLogin()" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl text-xs">보안 로그인</button>
        </div>
        <button @click="showPasswordModal = true" class="text-xs text-gray-400 underline cursor-pointer">⚙️ 최고 관리자 로그인</button>
      </div>
    </template>

    <template x-if="isUserLoggedIn">
      <div class="flex-1 flex flex-col overflow-hidden">
        
        <div class="flex border-b border-gray-100 bg-gray-50 p-2 gap-1 shrink-0">
          <button x-show="isAdminAuthenticated" @click="step = 'admin';" :class="step === 'admin' ? 'bg-red-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold text-xs cursor-pointer">
            ⚙️ 관리자 제어창
          </button>
          <button @click="step = 'driver'; driverResetAction();" :class="step === 'driver' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold text-xs cursor-pointer">
            👨‍✈️ 운전자
          </button>
          <button @click="step = 'passenger'; selectedTrip = null; lastReservedData = null;" :class="step === 'passenger' ? 'bg-emerald-600 text-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-2 text-center rounded-lg font-bold text-xs cursor-pointer">
            🙋‍♀️ 동승자
          </button>
        </div>

        <div class="bg-amber-50 border-b border-amber-100 px-4 py-2.5 text-xs text-amber-800 font-bold text-center shrink-0" x-show="notice">
          <div x-text="notice"></div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-5">

          <template x-if="step === 'admin' && isAdminAuthenticated">
            <div class="space-y-4">
              <div class="bg-red-50 p-3 rounded-xl border border-red-100 text-xs font-black text-red-900">👑 최고 관리자 시스템 콘솔</div>
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-2">
                <span class="text-xs font-black text-gray-800 block">📢 공지사항 편집</span>
                <textarea x-model="notice" rows="2" class="w-full p-2 border rounded-lg text-xs font-bold bg-gray-50 focus:bg-white focus:outline-none"></textarea>
                <button @click="updateSystemNotice()" class="w-full bg-amber-500 text-white font-bold py-1.5 rounded-lg text-xs">📢 공지사항 배포</button>
              </div>
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-3🍎">
                <span class="text-xs font-black text-gray-800 block">💬 메시지 서식 관리</span>
                <textarea x-model="msgTemplatePassenger" rows="3" class="w-full p-2 border rounded-lg text-[11px] bg-gray-50"></textarea>
                <textarea x-model="msgTemplateDriver" rows="3" class="w-full p-2 border rounded-lg text-[11px] bg-gray-50"></textarea>
                <button @click="updateMsgTemplates()" class="w-full bg-indigo-600 text-white font-bold py-1.5 rounded-lg text-xs">💾 서식 저장</button>
              </div>
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-3">
                <span class="text-xs font-black text-gray-800 block">📍 정류소 목록 편집</span>
                <div class="border-t pt-2 space-y-1 max-h-48 overflow-y-auto">
                  <template x-for="(s, index) in masterStops" :key="s.id">
                    <div class="flex items-center gap-2 text-xs p-2 bg-gray-50 border rounded-lg">
                      <div class="flex items-center gap-1 bg-gray-200 px-2 py-1 rounded touch-none font-bold cursor-row-resize" draggable="true" @dragstart="handleAdminDragStart(index, $event)" @dragover="handleAdminDragOver(index, $event)" @dragend="handleAdminDragEnd()" @touchstart="handleAdminTouchStart(index, $event)" @touchmove="handleAdminTouchMove(index, $event)" @touchend="handleAdminTouchEnd()">☰ <span x-text="index + 1"></span></div>
                      <span class="font-bold text-gray-700 truncate flex-1" x-text="s.name"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div class="bg-white p-4 rounded-xl border border-gray-200 space-y-3">
                <span class="text-xs font-black text-gray-800 block">👥 회원 명단 대량 등록</span>
                <textarea x-model="bulkMemberInput" rows="3" placeholder="홍길동,1234" class="w-full p-2 bg-white border rounded-lg text-xs font-bold"></textarea>
                <button @click="addBulkMembers()" class="w-full bg-blue-700 text-white font-bold py-1.5 rounded-lg text-xs">👥 일괄 등록</button>
                <div class="border-t pt-2 space-y-1 max-h-36 overflow-y-auto">
                  <template x-for="m in allowedMembers" :key="m.id">
                    <div class="flex justify-between items-center text-xs p-2 bg-gray-50 border rounded-lg">
                      <span class="font-extrabold" x-text="`${m.name} (${m.phoneTail})`"></span>
                      <button @click="resetMemberPassword(m.id)" class="bg-white border text-[10px] px-1 py-0.5 rounded">비번 리셋</button>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <template x-if="step === 'driver'">
            <div class="space-y-4">
              <div>
                <h2 class="text-base font-black text-gray-900">👨‍✈️ 운전자 카풀 등록</h2>
              </div>

              <div class="bg-gray-50 p-3.5 rounded-xl border space-y-3 text-xs">
                <div class="bg-indigo-50 p-2.5 rounded-lg border border-indigo-100 space-y-1.5">
                  <label class="block font-black text-indigo-950">🔄 운행 형태 설정 (복수 선택 시 자동 왕복 처리)</label>
                  <div class="flex gap-4 font-bold text-gray-700">
                    <label class="flex items-center gap-1.5 cursor-pointer">
                      <input type="checkbox" value="go" x-model="driverDriveType" class="w-4 h-4 text-indigo-600"> 가는 길
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer">
                      <input type="checkbox" value="back" x-model="driverDriveType" class="w-4 h-4 text-indigo-600"> 오는 길
                    </label>
                  </div>
                </div>

                <input type="tel" x-model="inputDriverPhone" class="w-full p-2 border rounded-lg bg-white font-bold">
                <input type="date" x-model="inputDate" class="w-full p-2 border rounded-lg bg-white font-bold">
                <div class="grid grid-cols-2 gap-2">
                  <input type="time" x-model="inputTime" class="w-full p-2 border rounded-lg bg-white">
                  <select x-model="inputSeats" class="w-full p-2 border rounded-lg bg-white font-bold">
                    <option value="1">1석</option><option value="2">2석</option><option value="3">3석</option><option value="4">4석</option>
                  </select>
                </div>
              </div>

              <div class="space-y-1.5">
                <div class="grid grid-cols-1 gap-1 max-h-32 overflow-y-auto bg-gray-50 p-2 rounded-xl border">
                  <template x-for="stop in masterStops" :key="stop.id">
                    <label class="flex items-center gap-2 p-2 bg-white rounded-lg border text-xs cursor-pointer">

                  </template>

                  <template x-for="(stop, index) in driverOrderedStops" :key="stop.id">
                    <div class="flex items-center gap-2 p-2 bg-white border rounded-lg text-xs select-none">
                      <div class="flex items-center gap-1 bg-gray-100 px-2 py-1 rounded touch-none font-bold cursor-row-resize" draggable="true" @dragstart="handleDragStart(index, $event)" @dragover="handleDragOver(index, $event)" @dragend="handleDragEnd()" @touchstart="handleTouchStart(index, $event)" @touchmove="handleTouchMove(index, $event)" @touchend="handleTouchEnd()">☰ <span x-text="index + 1"></span></div>

                    <div class="flex justify-between items-start">
                      <div class="text-sm">
                        <span class="font-bold text-gray-900" x-text="trip.date"></span>

    <div x-show="showMyInfoModal" class="absolute inset-0 bg-black/60 flex justify-center items-center p-6 z-50" x-transition>

        </div>
      </div>
    </div>

    <div x-show="showPasswordModal" class="absolute inset-0 bg-black/60 flex justify-center items-center p-6 z-50" x-transition>
      <div class="bg-white rounded-2xl p-5 w-full max-w-xs space-y-2">
        <input type="text" x-model="adminIdInput" placeholder="ID" class="w-full p-2 text-xs border text-center font-bold">
        <input type="password" x-model="adminPasswordInput" @keydown.enter="tryAdminAccess()" placeholder="PASSWORD" class="w-full p-2 text-xs border text-center font-bold">
        <button @click="tryAdminAccess()" class="w-full bg-red-600 text-white py-1.5 rounded-lg text-xs">인증</button>
      </div>
    </div>

    <div class="p-2.5 bg-gray-50 border-t text-center text-[10px] text-gray-400 font-semibold shrink-0">
      창원경화카풀 시스템 v31 © 2026
    </div>
  </div>

</body>
